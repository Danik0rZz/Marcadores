    function itemDetail(item) {
      if (item.type === 'bookmark') {
        return '<div class="detail-inner single-column"><div><div class="detail-stack"><div><div class="detail-label">Descripción</div><div class="detail-copy">' + escapeHtml(item.description || 'Sin descripción.') + '</div></div><div><div class="detail-label">URL completa</div><a class="detail-url" href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(item.url) + '</a></div><div><div class="detail-label">Tags</div><div class="tag-row">' + renderTags(item.tags) + '</div></div></div>' + relatedHtml(item) + '</div></div>';
      }
      return '<div class="detail-inner"><div><div class="detail-stack"><div><div class="detail-label">Descripción</div><div class="detail-copy">' + escapeHtml(item.description || 'Sin descripción.') + '</div></div><div><div class="detail-label">Vista previa</div><div class="detail-copy">' + escapeHtml(truncate(item.content,260) || 'La nota no tiene contenido.') + '</div></div><div><div class="detail-label">Tags</div><div class="tag-row">' + renderTags(item.tags) + '</div></div></div>' + relatedHtml(item) + '</div><div class="detail-meta-grid"><div><div class="detail-label">Creada</div><div class="detail-copy">' + formatDate(item.createdAt) + '</div></div><div><div class="detail-label">Modificada</div><div class="detail-copy">' + formatDate(item.updatedAt) + '</div></div><div><div class="detail-label">Formato</div><div class="detail-copy">Markdown</div></div><div><div class="detail-label">Estado</div><div class="detail-copy">' + (item.favorite ? 'Favorita' : 'Normal') + '</div></div></div></div>';
    }

    function rowActions(item) {
      return '<div class="grid-actions">' + (item.type === 'bookmark' ? '<button class="icon-button" data-action="open-url" data-id="' + item.id + '" title="Abrir URL">' + icon('open',15) + '</button>' : '') +
        (item.type === 'note' ? '<button class="icon-button" data-action="preview-note" data-type="note" data-id="' + item.id + '" title="Ver nota">' + icon('document',15) + '</button>' : '') +
        '<button class="icon-button ' + (item.favorite ? 'starred' : '') + '" data-action="favorite" data-type="' + item.type + '" data-id="' + item.id + '" title="Favorito">' + icon('star',15,item.favorite) + '</button>' +
        '<button class="icon-button" data-action="edit" data-type="' + item.type + '" data-id="' + item.id + '" title="Editar">' + icon('edit',15) + '</button>' +
        '<button class="icon-button" data-action="clone" data-type="' + item.type + '" data-id="' + item.id + '" title="Clonar">' + icon('clone',15) + '</button>' +
        '<button class="icon-button danger" data-action="trash" data-type="' + item.type + '" data-id="' + item.id + '" title="Mover a papelera">' + icon('trash',15) + '</button></div>';
    }

    function renderList(items, type) {
      const isNote = type === 'note';
      return '<div class="data-grid ' + (isNote ? 'notes-grid' : '') + '"><div class="grid-header"><div>Categoría</div><div>Subcategoría</div><div>Título</div>' + (isNote ? '<div>Modificada</div>' : '') + '<div style="text-align:right">Acciones</div></div>' + items.map((item,index) =>
        '<div class="grid-item ' + (!isNote ? 'bookmark-grid-item ' : '') + (state.expandedId === item.id ? 'expanded' : '') + '" data-grid-item="' + item.id + '"><div class="grid-row" role="button" tabindex="0" aria-expanded="' + (state.expandedId === item.id ? 'true' : 'false') + '" data-action="expand" data-id="' + item.id + '" style="--i:' + Math.min(index,12) + ';--accent:' + resolvePaletteColor(item.color) + '"><div class="grid-cell">' + escapeHtml(item.category || 'Sin categoría') + '</div><div class="grid-cell">' + escapeHtml(item.subcategory || '—') + '</div><div class="grid-cell title-cell"><span class="title-accent"></span>' + escapeHtml(item.title) + '</div>' + (isNote ? '<div class="grid-cell">' + formatShortDate(item.updatedAt) + '</div>' : '') + rowActions(item) + '</div><div class="grid-detail">' + (state.expandedId === item.id ? itemDetail(item) : '') + '</div></div>'
      ).join('') + '</div>';
    }

    function renderCollection(type) {
      const isBookmark = type === 'bookmark';
      const items = isBookmark ? state.bookmarks : state.notes;
      const filtered = searchService.filter(items);
      const section = isBookmark ? 'bookmarks' : 'notes';
      const view = isBookmark ? state.prefs.bookmarkView : state.prefs.noteView;
      const hasFilters = Boolean(state.prefs.query || state.prefs.category || state.prefs.subcategory || state.prefs.tag || state.prefs.favorites || state.relationSource);
      const action = '<button class="button primary" type="button" data-action="quick-' + (isBookmark ? 'bookmark' : 'note') + '">' + icon('plus',16) + (isBookmark ? 'Nuevo marcador' : 'Nueva nota') + '</button>';
      return pageHead(section, action) + filterControls(type, items) + (!filtered.length ? emptyState(section, hasFilters) : (view === 'grid' ? renderCards(filtered) : renderList(filtered,type)));
    }

    function renderGlobalSearch() {
      const all = [...state.notes, ...state.bookmarks];
      const scoped = state.prefs.typeFilter === 'all' ? all : all.filter(item => item.type === state.prefs.typeFilter);
      const filtered = searchService.filter(scoped);
      const active = all.filter(item => !item.deletedAt);
      const categories = unique(active.map(item => item.category)).sort((a,b) => a.localeCompare(b,'es'));
      const subcategories = unique(active.map(item => item.subcategory)).sort((a,b) => a.localeCompare(b,'es'));
      const tags = unique(active.flatMap(item => item.tags || [])).sort((a,b) => a.localeCompare(b,'es'));
      const options = (values, selected, placeholder) => '<option value="">' + placeholder + '</option>' + values.map(value => '<option value="' + escapeHtml(value) + '" ' + (normalizeKey(selected) === normalizeKey(value) ? 'selected' : '') + '>' + escapeHtml(value) + '</option>').join('');
      const controls = '<div class="filters"><select class="filter-select" data-filter="typeFilter" aria-label="Filtrar por tipo"><option value="all" ' + (state.prefs.typeFilter === 'all' ? 'selected' : '') + '>Notas y marcadores</option><option value="note" ' + (state.prefs.typeFilter === 'note' ? 'selected' : '') + '>Sólo notas</option><option value="bookmark" ' + (state.prefs.typeFilter === 'bookmark' ? 'selected' : '') + '>Sólo marcadores</option></select><select class="filter-select" data-filter="category" aria-label="Filtrar por categoría">' + options(categories,state.prefs.category,'Todas las categorías') + '</select><select class="filter-select" data-filter="subcategory" aria-label="Filtrar por subcategoría">' + options(subcategories,state.prefs.subcategory,'Subcategorías') + '</select><select class="filter-select" data-filter="tag" aria-label="Filtrar por tag">' + options(tags,state.prefs.tag,'Todos los tags') + '</select><label class="check-row"><input type="checkbox" data-filter="favorites" ' + (state.prefs.favorites ? 'checked' : '') + '> Sólo favoritos</label><span class="filter-spacer"></span><span class="result-count">' + filtered.length + ' resultado' + (filtered.length === 1 ? '' : 's') + '</span></div>';
      return pageHead('search', '<button class="button" data-action="clear-filters">' + icon('close',15) + 'Limpiar búsqueda</button>') + controls + (!filtered.length ? '<div class="empty-state"><div class="empty-inner"><div class="empty-icon">' + icon('search',23) + '</div><h3>No hay coincidencias</h3><p>Prueba con otro título, categoría, tag, descripción, dominio o URL.</p><button class="button primary" data-action="clear-filters">' + icon('close',15) + 'Limpiar búsqueda</button></div></div>' : renderCards(filtered));
    }

    function breakdownRows(items, field) {
      const values = new Map();
      items.filter(item => !item.deletedAt).forEach(item => {
        const name = normalizeText(item[field]) || 'Sin clasificar';
        values.set(name, (values.get(name) || 0) + 1);
      });
      const rows = [...values.entries()].sort((a,b) => b[1]-a[1]).slice(0,7);
      const max = Math.max(...rows.map(row => row[1]),1);
      if (!rows.length) return '<div class="backup-caption" style="padding:16px 0">Aún no hay datos para desglosar.</div>';
      return rows.map(([name,count]) => '<div class="breakdown-row"><div class="breakdown-name">' + escapeHtml(name) + '</div><div class="bar-track"><div class="bar-fill" style="width:' + ((count/max)*100) + '%"></div></div><div class="breakdown-count">' + count + '</div></div>').join('');
    }

    function renderHome() {
      const activeNotes = state.notes.filter(i => !i.deletedAt);
      const activeBookmarks = state.bookmarks.filter(i => !i.deletedAt);
      const active = [...activeNotes,...activeBookmarks];
      const favorites = active.filter(i => i.favorite).length;
      const trash = [...state.notes,...state.bookmarks].filter(i => i.deletedAt).length;
      const recent = active.sort((a,b) => new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,7);
      const lastBackup = state.prefs.lastBackup;
      const backupAge = lastBackup ? Math.floor((Date.now()-new Date(lastBackup))/86400000) : null;
      return pageHead('home', '<button class="button" data-action="export">' + icon('download',16) + 'Backup rápido</button>') +
        '<div class="metric-grid"><div class="metric primary-metric"><div class="metric-label">' + icon('database',16) + 'Elementos activos</div><div class="metric-value">' + active.length + '</div><div class="metric-note">Tu espacio personal, guardado sólo en este navegador.</div></div><div class="metric"><div class="metric-label">' + icon('note',16) + 'Notas</div><div class="metric-value">' + activeNotes.length + '</div><div class="metric-note">en formato Markdown</div></div><div class="metric"><div class="metric-label">' + icon('bookmark',16) + 'Marcadores</div><div class="metric-value">' + activeBookmarks.length + '</div><div class="metric-note">enlaces documentados</div></div><div class="metric"><div class="metric-label">' + icon('star',16) + 'Favoritos</div><div class="metric-value">' + favorites + '</div><div class="metric-note">' + trash + ' elemento' + (trash === 1 ? '' : 's') + ' en papelera</div></div></div>' +
        '<div class="dashboard-grid"><div><section class="panel"><div class="panel-head"><span class="panel-title">Desglose por categoría</span><span class="panel-meta">Activos</span></div><div class="breakdown">' + breakdownRows(active,'category') + '</div></section><section class="panel"><div class="panel-head"><span class="panel-title">Desglose por subcategoría</span><span class="panel-meta">Principales</span></div><div class="breakdown">' + breakdownRows(active,'subcategory') + '</div></section></div>' +
        '<div><section class="panel"><div class="panel-head"><span class="panel-title">Última actividad</span><span class="panel-meta">' + recent.length + ' elementos</span></div><div class="recent-list">' + (recent.length ? recent.map(item => '<button class="recent-item" type="button" data-action="open-related" data-type="' + item.type + '" data-id="' + item.id + '"><div class="recent-icon">' + icon(item.type === 'note' ? 'note' : item.icon,15) + '</div><div class="recent-copy"><strong>' + escapeHtml(item.title) + '</strong><span>' + formatShortDate(item.updatedAt) + ' · ' + (item.type === 'note' ? 'Nota' : 'Marcador') + '</span></div>' + icon('chevron',13) + '</button>').join('') : '<div class="backup-caption" style="padding:18px 0">La actividad aparecerá al crear tu primer elemento.</div>') + '</div></section>' +
        '<section class="panel"><div class="backup-status"><div class="status-line"><span class="storage-dot"></span>Protección de datos</div><div class="backup-date">' + (lastBackup ? formatShortDate(lastBackup) : 'Sin backups') + '</div><div class="backup-caption">' + (!lastBackup ? 'Conviene exportar un JSON cuando empieces a guardar contenido.' : backupAge > 14 ? 'Han pasado ' + backupAge + ' días. Es buen momento para exportar.' : 'Tu último backup tiene ' + backupAge + ' día' + (backupAge === 1 ? '' : 's') + '.') + '</div><button class="button small" style="margin-top:14px" data-action="export">' + icon('download',14) + 'Exportar ahora</button></div></section></div></div>';
    }

    function trashHtml() {
      const deleted = [...state.notes,...state.bookmarks].filter(item => item.deletedAt).sort((a,b) => new Date(b.deletedAt)-new Date(a.deletedAt));
      if (!deleted.length) return emptyState('trash');
      return '<div class="trash-list">' + deleted.map(item => '<div class="trash-item"><div class="recent-icon">' + icon(item.type === 'note' ? 'note' : item.icon,15) + '</div><div class="trash-copy"><strong>' + escapeHtml(item.title) + '</strong><span>' + (item.type === 'note' ? 'Nota' : 'Marcador') + ' · eliminado ' + formatShortDate(item.deletedAt) + '</span></div><button class="icon-button" data-action="restore" data-type="' + item.type + '" data-id="' + item.id + '" title="Restaurar">' + icon('restore',15) + '</button><button class="icon-button danger" data-action="destroy" data-type="' + item.type + '" data-id="' + item.id + '" title="Eliminar definitivamente">' + icon('trash',15) + '</button></div>').join('') + '</div>';
    }

    function renderSettings() {
      const estimate = state.storageEstimate;
      const usage = estimate?.usage || 0, quota = estimate?.quota || 0;
      const percent = quota ? Math.max(.5, usage/quota*100) : 0;
      const deletedCount = [...state.notes,...state.bookmarks].filter(item => item.deletedAt).length;
      return pageHead('settings') + '<div class="settings-grid"><div><section class="panel"><div class="setting-section"><h2 class="setting-title">Backup JSON</h2><p class="setting-description">El backup incluye datos activos, papelera, taxonomías y metadatos del esquema.</p><div class="action-row"><button class="button primary" data-action="export">' + icon('download',16) + 'Exportar JSON</button><button class="button" data-action="import">' + icon('upload',16) + 'Importar JSON</button></div></div><div class="setting-section"><h2 class="setting-title">Estado del almacenamiento</h2><p class="setting-description">Datos persistentes de este navegador. No se sincronizan con ninguna nube.</p><div class="setting-row"><div class="setting-copy"><strong>IndexedDB</strong><span>' + (usage ? (usage/1024).toFixed(1) + ' KB utilizados' : 'Uso mínimo o no disponible') + '</span></div><span class="tag">esquema v' + SCHEMA_VERSION + '</span></div><div class="storage-bar"><div style="width:' + percent + '%"></div></div></div><div class="setting-section"><h2 class="setting-title">Preferencias</h2><div class="setting-row"><div class="setting-copy"><strong>Vista inicial de marcadores</strong><span>Se aplica al volver a la sección</span></div><select class="filter-select" data-setting="bookmarkView"><option value="grid" ' + (state.prefs.bookmarkView === 'grid' ? 'selected' : '') + '>Tarjetas</option><option value="list" ' + (state.prefs.bookmarkView === 'list' ? 'selected' : '') + '>Lista</option></select></div><div class="setting-row"><div class="setting-copy"><strong>Vista inicial de notas</strong><span>Se aplica al volver a la sección</span></div><select class="filter-select" data-setting="noteView"><option value="grid" ' + (state.prefs.noteView === 'grid' ? 'selected' : '') + '>Tarjetas</option><option value="list" ' + (state.prefs.noteView === 'list' ? 'selected' : '') + '>Lista</option></select></div><div class="setting-row"><div class="setting-copy"><strong>Restablecer preferencias</strong><span>Conserva todo tu contenido</span></div><button class="button small" data-action="reset-prefs">Restablecer</button></div></div></section></div>' +
        '<div><section class="panel"><div class="setting-section"><h2 class="setting-title">Papelera <span class="tag">' + deletedCount + '</span></h2><p class="setting-description">Restaura elementos o elimínalos definitivamente.</p>' + trashHtml() + (deletedCount ? '<button class="button danger small" style="margin-top:13px" data-action="empty-trash">' + icon('trash',14) + 'Vaciar papelera</button>' : '') + '</div></section><section class="panel"><div class="setting-section"><h2 class="setting-title">Último backup</h2><div class="backup-date">' + (state.prefs.lastBackup ? formatDate(state.prefs.lastBackup) : 'No registrado') + '</div><p class="setting-description" style="margin:7px 0 0">La fecha se actualiza al exportar o reemplazar datos desde JSON.</p></div></section></div></div>';
    }

    function render() {
      renderSidebar();
      const section = state.prefs.section;
      el('content').innerHTML = section === 'home' ? renderHome() : section === 'bookmarks' ? renderCollection('bookmark') : section === 'notes' ? renderCollection('note') : section === 'search' ? renderGlobalSearch() : renderSettings();
      el('globalSearch').value = state.prefs.query;
      applyAccessibleButtonLabels(document);
    }

    function modalShell(title, subtitle, body, footer, wide = false) {
      const layer = el('modalLayer');
      layer.innerHTML = '<div class="modal ' + (wide ? 'wide' : '') + '" role="document"><div class="modal-head"><div class="modal-head-copy"><h2>' + escapeHtml(title) + '</h2>' + (subtitle ? '<p>' + escapeHtml(subtitle) + '</p>' : '') + '</div><button class="icon-button" data-action="close-modal" title="Cerrar">' + icon('close',17) + '</button></div><div class="modal-body">' + body + '</div>' + (footer ? '<div class="modal-footer">' + footer + '</div>' : '') + '</div>';
      applyAccessibleButtonLabels(layer);
      layer.classList.add('open'); layer.setAttribute('aria-hidden','false');
      requestAnimationFrame(() => layer.querySelector('input,textarea,button')?.focus());
    }

    function closeModal(force = false) {
      const layer = el('modalLayer');
      if (!force && layer.querySelector('.unsaved.visible')) {
        if (!window.confirm('Hay cambios sin guardar. ¿Quieres cerrar el formulario y descartarlos?')) return;
      }
      layer.classList.remove('open'); layer.setAttribute('aria-hidden','true'); layer.innerHTML = '';
      const guideDlg = el('guideDialog'); if (guideDlg && guideDlg.open) guideDlg.close();
    }

    function confirmDialog(title, message, actionLabel, callback, dangerous = true) {
      modalShell(title, '', '<div class="confirm-copy"><div class="confirm-visual">' + icon(dangerous ? 'alert' : 'check',22) + '</div><h3>' + escapeHtml(title) + '</h3><p>' + escapeHtml(message) + '</p></div>', '<button class="button" data-action="close-modal">Cancelar</button><button class="button ' + (dangerous ? 'danger' : 'primary') + '" id="confirmAction">' + escapeHtml(actionLabel) + '</button>');
      el('confirmAction').addEventListener('click', async () => { el('confirmAction').disabled = true; await callback(); closeModal(true); });
    }

    function colorSpectrumHtml(selectedColor) {
      return '<div class="color-spectrum">' + colorTones.map(tone => '<div class="color-tone-row"><span class="color-tone-label">' + tone.label + '</span><div class="color-picker">' + tone.colors.map(([name,color]) => '<button type="button" class="color-option ' + (selectedColor === color ? 'selected' : '') + '" style="--color:' + color + '" data-color="' + color + '" title="' + name + ' · ' + tone.label.toLocaleLowerCase('es') + '" aria-label="' + name + ', intensidad ' + tone.label.toLocaleLowerCase('es') + '"></button>').join('') + '</div></div>').join('') + '</div>';
    }

    function bookmarkPreviewHtml(data) {
      const color = resolvePaletteColor(data.color);
      const glyph = bookmarkIcons.includes(data.icon) ? data.icon : 'link';
      const title = normalizeText(data.title) || 'Título del marcador';
      const category = normalizeText(data.category) || 'Sin categoría';
      const subcategory = normalizeText(data.subcategory) || 'Sin subcategoría';
      const description = normalizeText(data.description) || 'La descripción aparecerá aquí mientras escribes.';
      const url = normalizeUrl(data.url);
      const domain = url ? domainOf(url) : 'ejemplo.com';
      const favorite = data.favorite === 'on';
      return '<div class="preview-example"><div class="preview-example-label">Tarjeta</div><div class="bookmark-preview-card" style="--accent:' + color + '"><div class="preview-card-head"><div class="preview-symbol">' + icon(glyph,16) + '</div><div class="preview-card-copy"><strong>' + escapeHtml(title) + '</strong><div class="preview-taxonomy">' + escapeHtml(category) + ' · ' + escapeHtml(subcategory) + '</div></div></div><p class="preview-description">' + escapeHtml(description) + '</p><div class="preview-card-foot"><span class="preview-card-domain">' + escapeHtml(domain) + '</span>' + icon('star',12,favorite) + icon('edit',12) + icon('clone',12) + '</div></div></div><div class="preview-example"><div class="preview-example-label">Lista</div><div class="bookmark-preview-list" style="--accent:' + color + '"><div class="preview-list-head"><span>Categoría</span><span>Subcategoría</span><span>Título</span><span>Acciones</span></div><div class="preview-list-row"><span>' + escapeHtml(category) + '</span><span>' + escapeHtml(subcategory) + '</span><span class="preview-list-title">' + escapeHtml(title) + '</span><span class="preview-list-actions">' + icon('open',11) + icon('star',11,favorite) + icon('edit',11) + '</span></div></div></div>';
    }

    function updateBookmarkPreview(form) {
      const target = el('bookmarkLivePreview');
      if (target) target.innerHTML = bookmarkPreviewHtml(Object.fromEntries(new FormData(form)));
    }

    function bookmarkForm(item = null) {
      const source = item || { title:'', category:'', subcategory:'', tags:[], url:'', color:DEFAULT_COLOR, icon:'link', favorite:false, description:'' };
      const value = { ...source, color:resolvePaletteColor(source.color) };
      const body = '<form id="bookmarkForm" class="form-grid" novalidate><div class="field full"><label for="bmTitle">Título *</label><input class="input" id="bmTitle" name="title" value="' + escapeHtml(value.title) + '" autocomplete="off"><div class="field-error" data-error="title"></div></div><div class="field"><label for="bmCategory">Categoría</label><input class="input" id="bmCategory" name="category" list="categoryOptions" value="' + escapeHtml(value.category) + '"></div><div class="field"><label for="bmSubcategory">Subcategoría</label><input class="input" id="bmSubcategory" name="subcategory" list="subcategoryOptions" value="' + escapeHtml(value.subcategory) + '"></div><div class="field full"><label for="bmUrl">URL *</label><input class="input" id="bmUrl" name="url" value="' + escapeHtml(value.url) + '" placeholder="https://ejemplo.com"><div class="field-error" data-error="url"></div></div><div class="field full"><label for="bmTags">Tags</label><input class="input" id="bmTags" name="tags" list="tagOptions" value="' + escapeHtml((value.tags || []).join(', ')) + '" placeholder="frontend, lectura, referencia"><span class="hint">Separa varios tags con comas.</span></div><div class="field full"><label for="bmDescription">Descripción</label><textarea class="textarea" id="bmDescription" name="description" rows="3">' + escapeHtml(value.description) + '</textarea></div><div class="field full"><label>Apariencia del marcador</label><div class="bookmark-appearance"><div class="appearance-controls"><div class="appearance-group"><span class="appearance-label">Color de acento</span>' + colorSpectrumHtml(value.color) + '</div><div class="appearance-group"><span class="appearance-label">Icono</span><div class="icon-picker">' + bookmarkIcons.map(name => '<button type="button" class="icon-option ' + (value.icon === name ? 'selected' : '') + '" data-bookmark-icon="' + name + '" title="' + name + '">' + icon(name,17) + '</button>').join('') + '</div></div><label class="check-row"><input type="checkbox" name="favorite" ' + (value.favorite ? 'checked' : '') + '> Guardar como favorito</label><input type="hidden" name="color" value="' + value.color + '"><input type="hidden" name="icon" value="' + value.icon + '"></div><aside class="bookmark-preview-panel"><div class="preview-panel-title">Vista previa</div><div id="bookmarkLivePreview">' + bookmarkPreviewHtml({ ...value, favorite:value.favorite ? 'on' : '' }) + '</div></aside></div></div></form>';
      modalShell(item ? 'Editar marcador' : 'Nuevo marcador', item ? 'Actualiza sus datos y conexiones.' : 'Guarda un enlace con el contexto que necesitarás después.', body, '<span class="unsaved" id="unsavedIndicator"><span class="storage-dot"></span>Cambios sin guardar</span><button class="button" data-action="close-modal">Cancelar</button><button class="button primary" id="saveBookmark">' + icon('check',16) + 'Guardar marcador</button>', true);
      const form = el('bookmarkForm');
      form.addEventListener('input', () => { el('unsavedIndicator').classList.add('visible'); updateBookmarkPreview(form); });
      form.querySelectorAll('[data-color]').forEach(button => button.addEventListener('click', () => { form.elements.color.value = button.dataset.color; form.querySelectorAll('[data-color]').forEach(b => b.classList.toggle('selected',b === button)); el('unsavedIndicator').classList.add('visible'); updateBookmarkPreview(form); }));
      form.querySelectorAll('[data-bookmark-icon]').forEach(button => button.addEventListener('click', () => { form.elements.icon.value = button.dataset.bookmarkIcon; form.querySelectorAll('[data-bookmark-icon]').forEach(b => b.classList.toggle('selected',b === button)); el('unsavedIndicator').classList.add('visible'); updateBookmarkPreview(form); }));
      el('saveBookmark').addEventListener('click', async () => {
        form.querySelectorAll('.field-error').forEach(node => node.textContent = '');
        const data = Object.fromEntries(new FormData(form));
        const title = normalizeText(data.title), url = normalizeUrl(data.url);
        let invalid = false;
        if (!title) { form.querySelector('[data-error="title"]').textContent = 'Escribe un título.'; invalid = true; }
        if (!url) { form.querySelector('[data-error="url"]').textContent = 'Escribe una URL web válida.'; invalid = true; }
        if (invalid) { toast('Revisa el formulario','Hay campos que necesitan atención.','error'); return; }
        await entityService.save('bookmark', { title, url, category:normalizeText(data.category), subcategory:normalizeText(data.subcategory), tags:parseTags(data.tags), description:normalizeText(data.description), color:resolvePaletteColor(data.color), icon:bookmarkIcons.includes(data.icon) ? data.icon : 'link', favorite:form.elements.favorite.checked }, item?.id);
        closeModal(true); toast('Marcador guardado','El enlace ya está en tu biblioteca.'); render();
      });
    }

    function notePreviewModal(item) {
      if (!item) return;
      const body = '<div class="note-inspector"><div class="note-inspector-summary"><section class="inspector-block"><h3>Categoría</h3><p>' + escapeHtml(item.category || 'Sin categoría') + '</p></section><section class="inspector-block"><h3>Subcategoría</h3><p>' + escapeHtml(item.subcategory || 'Sin subcategoría') + '</p></section><section class="inspector-block"><h3>Tags</h3><div class="tag-row">' + renderTags(item.tags) + '</div></section><section class="inspector-block"><h3>Descripción</h3><p>' + escapeHtml(item.description || 'Sin descripción.') + '</p></section></div><article class="markdown-preview note-reader">' + markdownService.render(item.content, item.images) + '</article>' + relatedHtml(item) + '</div>';
      modalShell(item.title,'Vista de lectura',body,'<button class="button" data-action="close-modal">Cerrar</button><button class="button primary" id="inspectEditNote">' + icon('edit',16) + 'Editar nota</button>',true);
      el('inspectEditNote').addEventListener('click', () => { closeModal(true); noteForm(item); });
    }

    function noteForm(item = null) {
      const value = item || { title:'', category:'', subcategory:'', tags:[], description:'', content:'', favorite:false, images:{} };
      const body = '<form id="noteForm" class="form-grid" novalidate><div class="field full"><label for="noteTitle">Título *</label><input class="input" id="noteTitle" name="title" value="' + escapeHtml(value.title) + '"><div class="field-error" data-error="title"></div></div><div class="field"><label for="noteCategory">Categoría</label><input class="input" id="noteCategory" name="category" list="categoryOptions" value="' + escapeHtml(value.category) + '"></div><div class="field"><label for="noteSubcategory">Subcategoría</label><input class="input" id="noteSubcategory" name="subcategory" list="subcategoryOptions" value="' + escapeHtml(value.subcategory) + '"></div><div class="field full"><label for="noteTags">Tags</label><input class="input" id="noteTags" name="tags" list="tagOptions" value="' + escapeHtml((value.tags || []).join(', ')) + '" placeholder="concepto, proyecto, referencia"></div><div class="field full"><label for="noteDescription">Descripción</label><textarea class="textarea" id="noteDescription" name="description" rows="2">' + escapeHtml(value.description) + '</textarea></div><div class="field full"><label for="noteContent">Contenido Markdown</label><div class="editor-toolbar"><button type="button" class="icon-button" data-md="heading" title="Título">' + icon('heading',15) + '</button><button type="button" class="icon-button" data-md="bold" title="Negrita">' + icon('bold',15) + '</button><button type="button" class="icon-button" data-md="italic" title="Cursiva">' + icon('italic',15) + '</button><span class="editor-separator"></span><button type="button" class="icon-button" data-md="list" title="Lista">' + icon('list',15) + '</button><button type="button" class="icon-button" data-md="link" title="Enlace">' + icon('link',15) + '</button><button type="button" class="icon-button" data-md="code" title="Código inline">' + icon('code',15) + '</button><button type="button" class="icon-button" data-md="codeblock" title="Bloque de código">' + icon('terminal',15) + '</button><button type="button" class="icon-button" data-md="quote" title="Cita">' + icon('quote',15) + '</button><span class="editor-separator"></span><button type="button" class="icon-button" data-action="markdown-guide" title="Guía de Markdown">' + icon('help',15) + '</button><div class="editor-modes"><button type="button" data-editor-mode="edit">Editar</button><button type="button" class="active" data-editor-mode="split">Dividir</button><button type="button" data-editor-mode="preview">Preview</button></div></div><div class="editor-space" id="editorSpace"><textarea class="markdown-editor" id="noteContent" name="content" spellcheck="true">' + escapeHtml(value.content) + '</textarea><div class="markdown-preview" id="markdownPreview">' + markdownService.render(value.content, value.images) + '</div></div></div><div class="field full"><label class="check-row"><input type="checkbox" name="favorite" ' + (value.favorite ? 'checked' : '') + '> Marcar como favorita</label></div></form>';
      modalShell(item ? 'Editar nota' : 'Nueva nota', item ? 'Última modificación: ' + formatDate(item.updatedAt) : 'Escribe en Markdown y revisa el resultado en directo.', body, '<span class="unsaved" id="unsavedIndicator"><span class="storage-dot"></span>Cambios sin guardar</span><button class="button" data-action="close-modal">Cancelar</button><button class="button primary" id="saveNote">' + icon('check',16) + 'Guardar nota</button>', true);
      const form = el('noteForm'), textarea = el('noteContent'), preview = el('markdownPreview');
      let formImages = { ...(value.images || {}) };
      const markDirty = () => el('unsavedIndicator').classList.add('visible');
      form.addEventListener('input', event => { markDirty(); if (event.target === textarea) preview.innerHTML = markdownService.render(textarea.value, formImages); });
      textarea.addEventListener('paste', event => {
        const items = event.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            event.preventDefault();
            const file = item.getAsFile();
            if (!file) continue;
            const reader = new FileReader();
            reader.onload = e => {
              const img = new Image();
              img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height;
                const MAX_WIDTH = 800;
                if (width > MAX_WIDTH) { height = Math.round(height * MAX_WIDTH / width); width = MAX_WIDTH; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                const base64 = canvas.toDataURL('image/jpeg', 0.7);
                const start = textarea.selectionStart, end = textarea.selectionEnd;
                const imgId = 'img-' + Date.now();
                formImages[imgId] = base64;
                textarea.setRangeText(`![Imagen pegada](local:${imgId})\n`, start, end, 'end');
                textarea.focus(); preview.innerHTML = markdownService.render(textarea.value, formImages); markDirty();
              };
              img.src = e.target.result;
            };
            reader.readAsDataURL(file);
            break;
          }
        }
      });
      form.querySelectorAll('[data-editor-mode]').forEach(button => button.addEventListener('click', () => { const mode = button.dataset.editorMode; el('editorSpace').className = 'editor-space' + (mode === 'split' ? '' : ' mode-' + mode); form.querySelectorAll('[data-editor-mode]').forEach(b => b.classList.toggle('active', b === button)); if (mode !== 'edit') preview.innerHTML = markdownService.render(textarea.value, formImages); }));
      const snippets = { heading:['## ','Título'], bold:['**','texto en negrita','**'], italic:['*','texto en cursiva','*'], list:['- ','elemento'], link:['[','texto','](https://)'], code:['`','código','`'], codeblock:['```\n','código','\n```'], quote:['> ','cita'] };
      form.querySelectorAll('[data-md]').forEach(button => button.addEventListener('click', () => {
        const parts = snippets[button.dataset.md], start = textarea.selectionStart, end = textarea.selectionEnd;
        const selected = textarea.value.slice(start,end) || parts[1]; const before = parts[0], after = parts[2] || '';
        textarea.setRangeText(before + selected + after,start,end,'end'); textarea.focus(); preview.innerHTML = markdownService.render(textarea.value, formImages); markDirty();
      }));
      form.querySelector('[data-action="markdown-guide"]')?.addEventListener('click', () => {
        const dlg = el('guideDialog');
        if (!dlg) return;
        const guideMd = `# Guía de Markdown\n\n## Títulos\nAñade almohadillas \`#\` según el tamaño:\n\`# Título 1\` -> se convierte en el título mayor.\n\`## Título 2\` -> se convierte en el título medio.\n\`### Título 3\` -> se convierte en el título menor.\n\n## Énfasis\nPara **negrita**: \`**texto**\`\nPara *cursiva*: \`*texto*\`\n\n## Listas\nDesordenada:\n\`- Elemento 1\`\n\`- Elemento 2\`\n\nOrdenada:\n\`1. Primer paso\`\n\`2. Segundo paso\`\n\n## Enlaces\nEl formato es corchetes y paréntesis \`[texto](url)\`:\nEjemplo: \`[Visitar Google](https://google.com)\` -> [Visitar Google](https://google.com)\n\n## Citas\nUsa el símbolo mayor que \`>\` al inicio:\n\`> El conocimiento es poder.\`\n\n> El conocimiento es poder.\n\n## Código\nPara código inline usa comillas invertidas simples: \\\`código\\\` -> \`código\`.\n\nPara bloques usa tres comillas invertidas y el nombre del lenguaje:\n\\\`\\\`\\\`javascript\nfunction saludar() {\n  console.log("¡Hola!");\n}\n\\\`\\\`\\\``;
        el('guideContent').innerHTML = markdownService.render(guideMd);
        dlg.showModal();
      });
      el('saveNote').addEventListener('click', async () => {
        const data = Object.fromEntries(new FormData(form)); const title = normalizeText(data.title);
        form.querySelector('[data-error="title"]').textContent = title ? '' : 'Escribe un título.';
        if (!title) { toast('Falta el título','Ponle un nombre a la nota antes de guardar.','error'); return; }
        const content = String(data.content || '');
        const activeImages = {};
        for (const key of Object.keys(formImages)) { if (content.includes(`local:${key}`)) activeImages[key] = formImages[key]; }
        await entityService.save('note', { title, category:normalizeText(data.category), subcategory:normalizeText(data.subcategory), tags:parseTags(data.tags), description:normalizeText(data.description), content, images:activeImages, contentFormat:'markdown', favorite:form.elements.favorite.checked }, item?.id);
        closeModal(true); toast('Nota guardada','Los cambios se han guardado en IndexedDB.'); render();
      });
    }

    function importPreview(payload) {
      const deleted = [...payload.notes,...payload.bookmarks].filter(item => item.deletedAt).length;
      const body = '<p class="setting-description">Archivo válido, exportado ' + (payload.exportedAt ? formatDate(payload.exportedAt) : 'sin fecha') + '.</p><div class="import-summary"><div class="import-stat"><strong>' + payload.notes.length + '</strong><span>Notas</span></div><div class="import-stat"><strong>' + payload.bookmarks.length + '</strong><span>Marcadores</span></div><div class="import-stat"><strong>' + (payload.tags?.length || 0) + '</strong><span>Tags</span></div><div class="import-stat"><strong>' + deleted + '</strong><span>Papelera</span></div></div><div class="setting-row"><div class="setting-copy"><strong>Fusionar con los datos actuales</strong><span>Conserva lo existente y crea copias cuando un id entra en conflicto.</span></div><button class="button primary" id="mergeImport">Fusionar</button></div><div class="setting-row"><div class="setting-copy"><strong>Reemplazar todo</strong><span>Borra la base actual y carga únicamente el contenido del archivo.</span></div><button class="button danger" id="replaceImport">Reemplazar</button></div>';
      modalShell('Importar backup','Elige cómo incorporar estos datos.',body,'<button class="button" data-action="close-modal">Cancelar</button>');
      el('mergeImport').addEventListener('click', async () => { const result = await backupService.merge(payload); closeModal(true); toast('JSON fusionado',result.added + ' elementos añadidos; ' + result.conflicts + ' conflictos resueltos.'); render(); });
      el('replaceImport').addEventListener('click', () => confirmDialog('Reemplazar toda la base','Se eliminarán los datos locales actuales antes de importar el archivo. Esta acción no se puede deshacer sin otro backup.','Reemplazar datos', async () => { await backupService.replace(payload); toast('JSON importado','La base local ha sido reemplazada correctamente.'); render(); }));
    }

    function toast(title, message, type = 'success') {
      const node = document.createElement('div');
      node.className = 'toast ' + type;
      node.innerHTML = '<div class="toast-icon">' + icon(type === 'error' ? 'alert' : 'check',16) + '</div><div class="toast-copy"><strong>' + escapeHtml(title) + '</strong><span>' + escapeHtml(message) + '</span></div>';
      el('toastStack').appendChild(node);
      setTimeout(() => { node.classList.add('leaving'); setTimeout(() => node.remove(),250); }, 3600);
    }

    function clearFilterState() {
      Object.assign(state.prefs,{ query:'', typeFilter:'all', category:'', subcategory:'', tag:'', favorites:false });
      state.relationSource = null; state.expandedId = null;
    }

    function resetFilters() {
      clearFilterState(); savePrefs(); render();
    }

    function applyTreeFilter(target) {
      const filter = target.dataset.treeFilter;
      const type = state.prefs.section === 'bookmarks' ? 'bookmark' : 'note';
      clearFilterState();
      if (filter === 'favorites') state.prefs.favorites = true;
      if (filter === 'category') {
        state.prefs.category = target.dataset.category || '';
        state.treeExpanded[type].add(normalizeKey(state.prefs.category));
      }
      if (filter === 'subcategory') {
        state.prefs.category = target.dataset.category || '';
        state.prefs.subcategory = target.dataset.subcategory || '';
        state.treeExpanded[type].add(normalizeKey(state.prefs.category));
      }
      savePrefs(); render();
    }

    async function handleAction(action, target) {
      const type = target.dataset.type, id = target.dataset.id;
      const collection = type === 'note' ? state.notes : state.bookmarks;
      const item = collection?.find(entry => entry.id === id);
      switch(action) {
        case 'quick-note': noteForm(); break;
        case 'quick-bookmark': bookmarkForm(); break;
        case 'close-modal': closeModal(); break;
        case 'clear-filters': resetFilters(); break;
        case 'clear-relation': state.relationSource = null; savePrefs(); render(); break;
        case 'set-view': if (target.dataset.type === 'bookmark') state.prefs.bookmarkView = target.dataset.view; else state.prefs.noteView = target.dataset.view; state.expandedId = null; savePrefs(); render(); break;
        case 'favorite': await entityService.toggleFavorite(type,id); render(); break;
        case 'edit': item && (type === 'note' ? noteForm(item) : bookmarkForm(item)); break;
        case 'clone': { const cloned = await entityService.clone(type,id); if (cloned) { toast('Elemento clonado','Se ha creado “' + cloned.title + '”.'); render(); } break; }
        case 'trash': item && confirmDialog('Mover a la papelera','“' + item.title + '” desaparecerá de las vistas normales, pero podrás restaurarlo.','Mover a papelera',async () => { await entityService.trash(type,id); toast('Elemento movido','Puedes recuperarlo desde Backups y ajustes.'); render(); }); break;
        case 'restore': await entityService.restore(type,id); toast('Elemento restaurado','Ha vuelto a su sección original.'); render(); break;
        case 'destroy': item && confirmDialog('Eliminar definitivamente','“' + item.title + '” se borrará de IndexedDB y no podrá restaurarse.','Eliminar definitivamente',async () => { await entityService.destroy(type,id); toast('Elemento eliminado','El registro se ha borrado definitivamente.'); render(); }); break;
        case 'expand': state.expandedId = state.expandedId === id ? null : id; render(); break;
        case 'open-url': { const bookmark = state.bookmarks.find(entry => entry.id === id); if (bookmark) window.open(bookmark.url,'_blank','noopener,noreferrer'); break; }
        case 'preview-note': if (item) notePreviewModal(item); break;
        case 'open-related': if (type === 'note') notePreviewModal(item); else if (item) window.open(item.url,'_blank','noopener,noreferrer'); break;
        case 'view-related': if (item) { clearFilterState(); state.relationSource = item; state.prefs.section = type === 'bookmark' ? 'notes' : 'bookmarks'; savePrefs(); render(); } break;
        case 'export': await backupService.export(); break;
        case 'import': el('importFile').click(); break;
        case 'reset-prefs': confirmDialog('Restablecer preferencias','Se reiniciarán la vista, filtros, búsqueda y estado del menú. Tus notas y marcadores no cambian.','Restablecer',async () => { uiStateService.reset(); state.prefs = { ...defaultPreferences, section:'settings' }; setupStaticUI(); render(); },false); break;
        case 'empty-trash': confirmDialog('Vaciar papelera','Todos los elementos de la papelera se eliminarán de forma definitiva.','Vaciar papelera',async () => { const deleted = [...state.notes,...state.bookmarks].filter(entry => entry.deletedAt); for (const entry of deleted) await entityService.destroy(entry.type,entry.id); toast('Papelera vaciada','Los elementos se han eliminado definitivamente.'); render(); }); break;
      }
    }

    function bindEvents() {
      document.addEventListener('click', async event => {
        const sectionButton = event.target.closest('[data-section]');
        if (sectionButton) {
          const nextSection = sectionButton.dataset.section;
          if (nextSection !== state.prefs.section && ['bookmarks','notes'].includes(nextSection)) clearFilterState();
          else { state.expandedId = null; state.relationSource = null; }
          state.prefs.section = nextSection; savePrefs(); render(); return;
        }
        const treeToggle = event.target.closest('[data-tree-toggle]');
        if (treeToggle) {
          event.preventDefault(); event.stopPropagation();
          const type = state.prefs.section === 'bookmarks' ? 'bookmark' : 'note';
          const key = normalizeKey(treeToggle.dataset.treeToggle);
          if (state.treeExpanded[type].has(key)) state.treeExpanded[type].delete(key); else state.treeExpanded[type].add(key);
          renderSidebar(); return;
        }
        const treeFilter = event.target.closest('[data-tree-filter]');
        if (treeFilter) { event.preventDefault(); event.stopPropagation(); applyTreeFilter(treeFilter); return; }
        const actionTarget = event.target.closest('[data-action]');
        if (actionTarget) { event.preventDefault(); event.stopPropagation(); await handleAction(actionTarget.dataset.action, actionTarget); return; }
        const card = event.target.closest('[data-card]');
        if (card) { const type = card.dataset.card, id = card.dataset.id; const item = (type === 'note' ? state.notes : state.bookmarks).find(entry => entry.id === id); if (type === 'note') notePreviewModal(item); else if (item) window.open(item.url,'_blank','noopener,noreferrer'); }
      });
      document.addEventListener('keydown', event => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') { event.preventDefault(); el('globalSearch').focus(); el('globalSearch').select(); }
        if (event.key === 'Escape') {
          const guideDlg = el('guideDialog');
          if (guideDlg && guideDlg.open) { event.preventDefault(); guideDlg.close(); return; }
          if (el('modalLayer').classList.contains('open')) closeModal();
        }
        if ((event.key === 'Enter' || event.key === ' ') && event.target.matches('[data-card], .grid-row[data-action="expand"]')) { event.preventDefault(); event.target.click(); }
      });
      window.addEventListener('beforeunload', event => {
        if (el('modalLayer').querySelector('.unsaved.visible')) { event.preventDefault(); event.returnValue = ''; }
      });
      el('globalSearch').addEventListener('input', event => {
        state.prefs.query = event.target.value;
        if (!['notes','bookmarks','search'].includes(state.prefs.section)) state.prefs.section = state.prefs.query ? 'search' : 'home';
        else if (state.prefs.section === 'search' && !state.prefs.query) state.prefs.section = 'home';
        clearTimeout(searchRenderTimer);
        const caret = event.target.value.length;
        searchRenderTimer = setTimeout(() => {
          savePrefs(); render();
          requestAnimationFrame(() => { el('globalSearch').focus(); el('globalSearch').setSelectionRange(caret,caret); });
        }, 90);
      });
      el('content').addEventListener('change', event => {
        const filter = event.target.dataset.filter;
        if (filter) {
          state.prefs[filter] = filter === 'favorites' ? event.target.checked : event.target.value;
          if (filter === 'category') {
            state.prefs.subcategory = '';
            const type = state.prefs.section === 'bookmarks' ? 'bookmark' : 'note';
            if (state.prefs.category) state.treeExpanded[type].add(normalizeKey(state.prefs.category));
          }
          state.relationSource = null; state.expandedId = null; savePrefs(); render();
        }
        const setting = event.target.dataset.setting;
        if (setting) { state.prefs[setting] = event.target.value; savePrefs(); toast('Preferencia guardada','Se aplicará al abrir la sección.'); }
      });
      el('brandMark').addEventListener('click', () => {
        state.prefs.sidebarCollapsed = !state.prefs.sidebarCollapsed;
        el('appShell').classList.toggle('sidebar-collapsed',state.prefs.sidebarCollapsed);
        el('brandMark').setAttribute('aria-expanded',String(!state.prefs.sidebarCollapsed));
        el('brandMark').setAttribute('aria-label',state.prefs.sidebarCollapsed ? 'Expandir menú' : 'Contraer menú');
        el('brandMark').title = state.prefs.sidebarCollapsed ? 'Expandir menú' : 'Contraer menú';
        savePrefs();
      });
      el('modalLayer').addEventListener('mousedown', event => { if (event.target === el('modalLayer')) closeModal(); });
      el('importFile').addEventListener('change', async event => {
        const file = event.target.files[0]; event.target.value = ''; if (!file) return;
        try { const payload = backupService.validate(JSON.parse(await file.text())); importPreview(payload); }
        catch (error) { toast('Error de JSON',error.message || 'No se pudo leer el archivo.','error'); }
      });
    }

    async function init() {
      setupStaticUI(); bindEvents();
      try {
        await storageService.init(); await loadData(); state.initialized = true; render();
        const last = state.prefs.lastBackup;
        if (last && (Date.now()-new Date(last))/86400000 > 21) setTimeout(() => toast('Backup recomendado','Han pasado más de 21 días desde la última exportación.'),700);
      } catch (error) {
        el('content').innerHTML = '<div class="empty-state"><div class="empty-inner"><div class="empty-icon" style="color:#fca5a5">' + icon('alert',23) + '</div><h3>No se pudo abrir el almacenamiento</h3><p>' + escapeHtml(error.message || 'IndexedDB no está disponible en este contexto.') + '</p></div></div>';
        toast('Error de almacenamiento','No se pudo iniciar IndexedDB.','error');
      }
    }

    return { init };
  })();

  App.init();
  </script>
</body>
</html>
