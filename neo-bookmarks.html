  <style>
    :root {
      --bg: #09090b;
      --panel: #111114;
      --panel-2: #18181b;
      --panel-3: #202024;
      --text: #fafafa;
      --muted: #a1a1aa;
      --muted-2: #71717a;
      --line: rgba(255,255,255,.075);
      --line-strong: rgba(255,255,255,.12);
      --emerald: #10b981;
      --emerald-soft: rgba(16,185,129,.11);
      --danger: #f87171;
      --warning: #fbbf24;
      --radius: 14px;
      --sidebar: 244px;
      --ease: cubic-bezier(.16,1,.3,1);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      min-width: 980px;
      background:
        radial-gradient(800px 460px at 12% -10%, rgba(16,185,129,.075), transparent 65%),
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 42px 42px, 42px 42px, auto;
      color: var(--text);
      font: 400 15px/1.5 Outfit, system-ui, sans-serif;
      overflow-x: auto;
    }
    button, input, textarea, select { font: inherit; }
    button { color: inherit; }
    a { color: inherit; }
    ::selection { background: rgba(16,185,129,.28); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d2d32; border: 3px solid transparent; background-clip: padding-box; border-radius: 999px; }
    .skip-link { position: fixed; left: 16px; top: 10px; z-index: 40; padding: 9px 13px; border-radius: 9px; color: #052e24; background: #6ee7b7; font-weight: 600; transform: translateY(-160%); transition: transform .2s var(--ease); }
    .skip-link:focus { transform: none; }

    .app-shell { min-height: 100dvh; display: grid; grid-template-columns: var(--sidebar) minmax(0, 1fr); transition: grid-template-columns .28s var(--ease); }
    .app-shell.sidebar-collapsed { --sidebar: 76px; }
    .sidebar {
      position: sticky; top: 0; height: 100dvh; padding: 18px 12px;
      border-right: 1px solid var(--line); background: rgba(9,9,11,.82); backdrop-filter: blur(18px);
      display: flex; flex-direction: column; z-index: 5; overflow: hidden;
    }
    .brand { height: 48px; display: flex; align-items: center; gap: 11px; padding: 0 10px; white-space: nowrap; }
    .brand-mark { width: 34px; height: 34px; padding: 0; flex: 0 0 34px; border: 1px solid rgba(16,185,129,.32); border-radius: 10px; display: grid; place-items: center; color: #6ee7b7; background: rgba(16,185,129,.08); box-shadow: inset 0 1px rgba(255,255,255,.06); cursor: pointer; transition: transform .18s var(--ease), background .18s, border-color .18s; }
    .brand-mark:hover { background: rgba(16,185,129,.14); border-color: rgba(52,211,153,.5); }
    .brand-mark:active { transform: scale(.94); }
    .brand-copy strong { display: block; font-size: 16px; letter-spacing: -.02em; }
    .brand-copy span { display: block; margin-top: -2px; color: var(--muted-2); font: 400 10px/1.4 "JetBrains Mono", monospace; }
    .sidebar-collapsed .brand-copy, .sidebar-collapsed .nav-copy, .sidebar-collapsed .nav-count, .sidebar-collapsed .sidebar-foot-copy { opacity: 0; pointer-events: none; }
    .sidebar-nav { margin-top: 24px; display: grid; gap: 6px; }
    .nav-button { width: 100%; height: 44px; padding: 0 11px; border: 1px solid transparent; border-radius: 11px; background: transparent; display: flex; align-items: center; gap: 11px; color: var(--muted); cursor: pointer; text-align: left; transition: .2s var(--ease); position: relative; white-space: nowrap; }
    .nav-button:hover { color: var(--text); background: rgba(255,255,255,.035); }
    .nav-button:active { transform: scale(.985); }
    .nav-button.active { color: #ecfdf5; background: var(--emerald-soft); border-color: rgba(16,185,129,.24); box-shadow: inset 0 1px rgba(255,255,255,.035), 0 8px 28px rgba(0,0,0,.18); }
    .nav-button svg { flex: 0 0 19px; }
    .nav-copy { transition: opacity .15s; }
    .nav-count { margin-left: auto; min-width: 24px; text-align: center; color: var(--muted-2); font: 500 11px/22px "JetBrains Mono", monospace; background: rgba(255,255,255,.04); border-radius: 999px; transition: opacity .15s; }
    .nav-button.active .nav-count { color: #6ee7b7; background: rgba(16,185,129,.11); }
    .sidebar-spacer { flex: 1; }
    .sidebar-tree { margin-top: 18px; padding: 16px 2px 8px; border-top: 1px solid var(--line); min-height: 0; overflow-y: auto; overflow-x: hidden; animation: treeIn .24s var(--ease); }
    .sidebar-tree:empty { display: none; }
    .sidebar-tree:not(:empty) { flex: 1; }
    .sidebar-tree:not(:empty) + .sidebar-spacer { flex: 0; }
    .sidebar-tree::-webkit-scrollbar { width: 6px; }
    .tree-head { display: flex; align-items: center; min-height: 27px; padding: 0 9px 7px; color: var(--muted-2); font-size: 11px; white-space: nowrap; }
    .tree-head span:last-child { margin-left: auto; font: 400 9px "JetBrains Mono", monospace; }
    .tree-list { display: grid; gap: 3px; }
    .tree-row { display: grid; grid-template-columns: 24px minmax(0,1fr); align-items: center; }
    .tree-row.no-toggle { grid-template-columns: minmax(0,1fr); }
    .tree-toggle { width: 24px; height: 34px; padding: 0; border: 0; background: transparent; color: var(--muted-2); display: grid; place-items: center; cursor: pointer; transition: color .18s, transform .18s; }
    .tree-toggle:hover { color: var(--text); }
    .tree-toggle svg { transition: transform .2s var(--ease); transform: rotate(180deg); }
    .tree-toggle.expanded svg { transform: rotate(-90deg); }
    .tree-link { width: 100%; min-width: 0; height: 34px; padding: 0 8px; border: 1px solid transparent; border-radius: 8px; background: transparent; color: var(--muted); display: flex; align-items: center; gap: 8px; cursor: pointer; text-align: left; transition: .18s var(--ease); }
    .tree-link:hover { color: var(--text); background: rgba(255,255,255,.032); }
    .tree-link:active { transform: scale(.985); }
    .tree-link.active { color: #a7f3d0; border-color: rgba(16,185,129,.22); background: rgba(16,185,129,.085); }
    .tree-link svg { flex: 0 0 15px; }
    .tree-name { min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
    .tree-count { min-width: 21px; height: 19px; padding: 0 6px; border-radius: 999px; color: var(--muted-2); background: rgba(255,255,255,.045); font: 500 9px/19px "JetBrains Mono", monospace; text-align: center; }
    .tree-link.active .tree-count { color: #6ee7b7; background: rgba(16,185,129,.11); }
    .tree-children { grid-column: 2; display: grid; gap: 2px; position: relative; padding: 2px 0 5px 8px; }
    .tree-children::before { content: ""; position: absolute; left: 4px; top: 0; bottom: 8px; width: 1px; background: rgba(255,255,255,.065); }
    .tree-child { height: 31px; padding-left: 10px; }
    .tree-child .tree-name { font-size: 11px; }
    .tree-unclassified { margin: 8px 8px 0 32px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,.045); color: var(--muted-2); display: flex; align-items: center; gap: 7px; font-size: 10px; }
    .tree-unclassified span:last-child { margin-left: auto; font: 400 9px "JetBrains Mono", monospace; }
    .sidebar-collapsed .sidebar-tree { display: none; }
    .sidebar-collapsed .sidebar-tree + .sidebar-spacer { flex: 1; }
    @keyframes treeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
    .sidebar-footer { display: grid; gap: 8px; }
    .storage-mini { padding: 12px 11px; border-top: 1px solid var(--line); color: var(--muted-2); white-space: nowrap; overflow: hidden; }
    .storage-mini .label { display: flex; align-items: center; gap: 8px; font-size: 12px; min-width: 0; }
    .storage-dot { width: 6px; height: 6px; flex: 0 0 6px; border-radius: 50%; background: var(--emerald); box-shadow: 0 0 0 4px rgba(16,185,129,.08); }
    .sidebar-foot-copy { min-width: 0; transition: opacity .15s; }
    .workspace { min-width: 0; }
    .topbar { height: 78px; position: sticky; top: 0; z-index: 4; display: flex; align-items: center; gap: 16px; padding: 0 34px; border-bottom: 1px solid var(--line); background: rgba(9,9,11,.78); backdrop-filter: blur(20px); }
    .search-wrap { flex: 1; max-width: 680px; position: relative; }
    .search-wrap > #searchIcon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted-2); pointer-events: none; display: grid; z-index: 1; }
    .search-input { width: 100%; height: 44px; padding: 0 84px 0 43px; color: var(--text); background: rgba(24,24,27,.78); border: 1px solid var(--line); border-radius: 12px; outline: none; transition: .2s var(--ease); }
    .search-input::placeholder { color: #66666f; }
    .search-input:focus { border-color: rgba(16,185,129,.42); box-shadow: 0 0 0 3px rgba(16,185,129,.08); background: var(--panel-2); }
    .search-shortcut { position: absolute; right: 10px; top: 9px; height: 26px; padding: 0 8px; border: 1px solid var(--line); border-radius: 7px; color: var(--muted-2); font: 500 10px/24px "JetBrains Mono", monospace; }
    .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 9px; }

    .button { height: 40px; padding: 0 15px; border-radius: 10px; border: 1px solid var(--line); background: rgba(255,255,255,.035); display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; white-space: nowrap; transition: transform .15s, border-color .2s, background .2s, color .2s; }
    .button:hover { background: rgba(255,255,255,.06); border-color: var(--line-strong); }
    .button:active { transform: scale(.97); }
    .button.primary { background: var(--emerald); border-color: var(--emerald); color: #052e24; font-weight: 650; }
    .button.primary:hover { background: #34d399; }
    .button.danger { color: #fecaca; border-color: rgba(248,113,113,.2); background: rgba(248,113,113,.07); }
    .button.ghost { background: transparent; }
    .button.small { height: 34px; padding: 0 11px; font-size: 13px; }
    .icon-button { width: 34px; height: 34px; padding: 0; border: 1px solid transparent; border-radius: 9px; background: transparent; color: var(--muted); display: inline-grid; place-items: center; cursor: pointer; transition: .18s var(--ease); }
    .icon-button:hover { color: var(--text); border-color: var(--line); background: rgba(255,255,255,.045); }
    .icon-button:active { transform: scale(.91); }
    .icon-button.starred { color: #fcd34d; }
    .icon-button.danger:hover { color: #fca5a5; background: rgba(248,113,113,.07); border-color: rgba(248,113,113,.18); }
    .icon-button svg, .button svg { pointer-events: none; }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible { outline: 2px solid rgba(52,211,153,.65); outline-offset: 2px; }

    .content { padding: 31px 34px 52px; max-width: 1680px; margin: 0 auto; }
    .page-head { display: flex; align-items: flex-end; gap: 20px; margin-bottom: 24px; }
    .eyebrow { color: #6ee7b7; font: 500 10px/1.4 "JetBrains Mono", monospace; letter-spacing: .12em; margin-bottom: 6px; }
    .page-title { margin: 0; font-size: 27px; line-height: 1.1; letter-spacing: -.035em; font-weight: 650; }
    .page-subtitle { margin: 8px 0 0; color: var(--muted); max-width: 660px; }
    .page-head-actions { margin-left: auto; display: flex; align-items: center; gap: 9px; }

    .filters { display: flex; align-items: center; gap: 8px; padding: 11px; margin-bottom: 18px; border: 1px solid var(--line); border-radius: 13px; background: rgba(17,17,20,.7); box-shadow: inset 0 1px rgba(255,255,255,.025); }
    .filter-select { height: 35px; min-width: 128px; padding: 0 32px 0 11px; color: var(--muted); background-color: #17171a; border: 1px solid var(--line); border-radius: 9px; outline: none; cursor: pointer; }
    .filter-select:hover { color: var(--text); border-color: var(--line-strong); }
    .filter-spacer { flex: 1; }
    .result-count { color: var(--muted-2); font: 500 11px/1 "JetBrains Mono", monospace; padding: 0 7px; }
    .view-switch { display: flex; padding: 3px; border: 1px solid var(--line); border-radius: 9px; background: #111114; }
    .view-switch button { width: 30px; height: 28px; border: 0; border-radius: 6px; background: transparent; color: var(--muted-2); display: grid; place-items: center; cursor: pointer; }
    .view-switch button.active { color: var(--text); background: #2a2a2f; box-shadow: inset 0 1px rgba(255,255,255,.05); }
    .relation-chip { display: inline-flex; align-items: center; gap: 8px; height: 34px; padding: 0 9px 0 12px; border-radius: 999px; border: 1px solid rgba(16,185,129,.22); color: #a7f3d0; background: rgba(16,185,129,.08); font-size: 12px; }
    .relation-chip button { border: 0; background: transparent; color: #6ee7b7; padding: 3px; display: grid; place-items: center; cursor: pointer; }

    .metric-grid { display: grid; grid-template-columns: 1.45fr repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .metric { min-height: 126px; padding: 20px; border: 1px solid var(--line); border-radius: var(--radius); background: linear-gradient(145deg, rgba(24,24,27,.92), rgba(17,17,20,.72)); position: relative; overflow: hidden; box-shadow: 0 18px 55px rgba(0,0,0,.16), inset 0 1px rgba(255,255,255,.03); }
    .metric.primary-metric::after { content: ""; position: absolute; width: 180px; height: 180px; right: -70px; bottom: -110px; border: 1px solid rgba(16,185,129,.18); border-radius: 50%; box-shadow: 0 0 0 28px rgba(16,185,129,.025), 0 0 0 56px rgba(16,185,129,.018); }
    .metric-label { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
    .metric-label svg { color: #6ee7b7; }
    .metric-value { margin-top: 16px; font: 500 30px/1 "JetBrains Mono", monospace; letter-spacing: -.045em; }
    .metric-note { margin-top: 10px; color: var(--muted-2); font-size: 12px; }
    .dashboard-grid { display: grid; grid-template-columns: minmax(0,1.6fr) minmax(300px,.8fr); gap: 16px; }
    .panel { border: 1px solid var(--line); border-radius: var(--radius); background: rgba(17,17,20,.72); box-shadow: inset 0 1px rgba(255,255,255,.025); overflow: hidden; }
    .panel + .panel { margin-top: 16px; }
    .panel-head { min-height: 56px; padding: 0 18px; display: flex; align-items: center; border-bottom: 1px solid var(--line); }
    .panel-title { font-weight: 600; letter-spacing: -.01em; }
    .panel-meta { margin-left: auto; color: var(--muted-2); font: 400 10px "JetBrains Mono", monospace; }
    .breakdown { padding: 8px 18px 14px; }
    .breakdown-row { display: grid; grid-template-columns: minmax(120px, 1fr) minmax(120px, 2fr) 34px; gap: 13px; align-items: center; min-height: 42px; border-bottom: 1px solid rgba(255,255,255,.045); }
    .breakdown-row:last-child { border-bottom: 0; }
    .breakdown-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { height: 5px; border-radius: 99px; background: #27272a; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: inherit; background: var(--emerald); opacity: .75; }
    .breakdown-count { text-align: right; color: var(--muted); font: 500 11px "JetBrains Mono", monospace; }
    .recent-list { padding: 4px 18px 10px; }
    .recent-item { width: 100%; min-height: 59px; padding: 0; display: flex; align-items: center; gap: 11px; color: inherit; background: transparent; border: 0; border-bottom: 1px solid rgba(255,255,255,.045); cursor: pointer; text-align: left; transition: transform .22s var(--ease), background .2s; }
    .recent-item:hover, .recent-item:focus-visible { transform: translateX(3px); background: rgba(255,255,255,.02); }
    .recent-item:last-child { border: 0; }
    .recent-icon { width: 31px; height: 31px; border-radius: 8px; background: rgba(255,255,255,.04); display: grid; place-items: center; color: var(--muted); }
    .recent-copy { min-width: 0; flex: 1; }
    .recent-copy strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 13px; font-weight: 500; }
    .recent-copy span { color: var(--muted-2); font-size: 11px; }
    .backup-status { padding: 18px; }
    .backup-date { margin: 8px 0 3px; font: 500 16px "JetBrains Mono", monospace; }
    .backup-caption { color: var(--muted-2); font-size: 12px; }
    .status-line { display: flex; align-items: center; gap: 8px; color: #a7f3d0; font-size: 12px; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(272px, 1fr)); gap: 13px; }
    .item-card { --accent: #22c55e; min-height: 214px; padding: 16px 18px 17px; border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--line)); border-top: 3px solid var(--accent); border-radius: var(--radius); background: linear-gradient(155deg, rgba(23,23,26,.96), rgba(14,14,17,.94)); box-shadow: 0 16px 42px rgba(0,0,0,.18), 0 10px 34px color-mix(in srgb, var(--accent) 4%, transparent), inset 0 1px rgba(255,255,255,.025); cursor: pointer; position: relative; overflow: hidden; content-visibility: auto; contain-intrinsic-size: 214px; transition: transform .24s var(--ease), border-color .24s, background .24s; animation: enter .45s var(--ease) backwards; animation-delay: calc(var(--i, 0) * 35ms); }
    .item-card::before { content: ""; position: absolute; inset: 0; background: linear-gradient(108deg, transparent 28%, color-mix(in srgb,var(--accent) 9%,transparent) 46%, rgba(255,255,255,.035) 50%, transparent 66%); transform: translateX(-115%); transition: transform .58s var(--ease); pointer-events: none; }
    .item-card::after { content: ""; position: absolute; top: -20px; right: -20px; width: 110px; height: 90px; background: radial-gradient(circle at 100% 0%, color-mix(in srgb, var(--accent) 13%, transparent), transparent 72%); pointer-events: none; }
    .item-card:hover { transform: translateY(-3px); border-color: color-mix(in srgb, var(--accent) 46%, rgba(255,255,255,.12)); background: linear-gradient(155deg, rgba(29,29,33,.98), rgba(16,16,19,.96)); }
    .item-card:hover::before, .item-card:focus-visible::before, .item-card:focus-within::before { transform: translateX(115%); }
    .item-card:focus-visible { outline: 2px solid color-mix(in srgb,var(--accent) 72%,white); outline-offset: 3px; }
    .item-card > * { position: relative; z-index: 1; }
    .item-card:active { transform: translateY(-1px) scale(.995); }
    @keyframes enter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; } }
    .card-top { display: flex; align-items: flex-start; gap: 12px; }
    .item-symbol { width: 44px; height: 44px; flex: 0 0 44px; border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent); border-radius: 10px; color: color-mix(in srgb, var(--accent) 84%, white); background: color-mix(in srgb, var(--accent) 10%, #111114); display: grid; place-items: center; box-shadow: inset 0 1px rgba(255,255,255,.035); transition: transform .3s var(--ease), background .24s; transform-origin: center; }
    .item-card:hover .item-symbol, .item-card:focus-visible .item-symbol, .item-card:focus-within .item-symbol { transform: translateY(-2px) rotate(-4deg) scale(1.07); background: color-mix(in srgb,var(--accent) 16%,#111114); }
    .card-heading { min-width: 0; flex: 1; }
    .card-title { margin: 0; font-size: 17px; line-height: 1.25; font-weight: 600; letter-spacing: -.018em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: transform .26s var(--ease), color .2s; }
    .item-card:hover .card-title, .item-card:focus-visible .card-title { transform: translateX(2px); color: #fff; }
    .card-taxonomy { min-width: 0; margin-top: 5px; color: color-mix(in srgb, var(--accent) 82%, white); display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; }

    .toast { min-height: 58px; padding: 11px 13px; border: 1px solid var(--line-strong); border-radius: 12px; background: rgba(27,27,31,.96); backdrop-filter: blur(12px); box-shadow: 0 18px 45px rgba(0,0,0,.32), inset 0 1px rgba(255,255,255,.05); display: flex; align-items: center; gap: 11px; animation: toastIn .3s var(--ease); pointer-events: auto; }
    .toast.leaving { animation: toastOut .25s ease forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(14px); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(10px); } }
    .toast-icon { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; color: #6ee7b7; background: rgba(16,185,129,.09); }

    .loading-skeleton { height: 220px; border: 1px solid var(--line); border-radius: var(--radius); background: linear-gradient(100deg, #111114 25%, #1c1c20 37%, #111114 52%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { to { background-position-x: -200%; } }
  </style>
</head>

      <button type="button" class="icon-button" onclick="event.stopPropagation(); document.getElementById('guideDialog').close();" title="Cerrar"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m6 6 12 12M18 6 6 18"/></svg></button>

  <style>dialog::backdrop { background: rgba(4,4,6,.68); backdrop-filter: blur(9px); }</style>

  <datalist id="tagOptions"></datalist>

  <script>
  'use strict';

  const App = (() => {
    const SCHEMA_VERSION = 1;
    const DB_NAME = 'atlas-knowledge-db';
    const DB_VERSION = 1;
    const colorTones = [
      { key:'low', label:'Bajo', colors:[['Rojo','#fecaca'],['Naranja','#fed7aa'],['Ámbar','#fde68a'],['Verde','#bbf7d0'],['Cian','#a5f3fc'],['Azul','#bfdbfe'],['Violeta','#ddd6fe']] },
      { key:'medium', label:'Medio', colors:[['Rojo','#ef4444'],['Naranja','#f97316'],['Ámbar','#f59e0b'],['Verde','#22c55e'],['Cian','#06b6d4'],['Azul','#3b82f6'],['Violeta','#8b5cf6']] },
      { key:'strong', label:'Fuerte', colors:[['Rojo','#7f1d1d'],['Naranja','#7c2d12'],['Ámbar','#78350f'],['Verde','#14532d'],['Cian','#164e63'],['Azul','#1e3a8a'],['Violeta','#4c1d95']] }
    ];
    const palette = colorTones.flatMap(tone => tone.colors.map(([,color]) => color));
    const DEFAULT_COLOR = '#22c55e';
    const legacyColorMap = {
      '#065f46':'#14532d','#166534':'#14532d','#115e59':'#164e63','#075985':'#1e3a8a','#3730a3':'#4c1d95','#92400e':'#78350f','#9f1239':'#7f1d1d','#52525b':'#1e3a8a',
      '#10b981':'#22c55e','#14b8a6':'#06b6d4','#38bdf8':'#3b82f6','#818cf8':'#8b5cf6','#fb7185':'#ef4444','#a1a1aa':'#3b82f6',
      '#34d399':'#bbf7d0','#4ade80':'#bbf7d0','#2dd4bf':'#a5f3fc','#0ea5e9':'#3b82f6','#6366f1':'#8b5cf6','#fbbf24':'#fde68a','#f43f5e':'#ef4444','#d4d4d8':'#ddd6fe'
    };
    const resolvePaletteColor = color => palette.includes(color) ? color : (legacyColorMap[color] || DEFAULT_COLOR);
    const bookmarkIcons = ['link', 'code', 'cloud', 'lock', 'terminal', 'database', 'document', 'folder'];
    const sectionInfo = {
      home: { title: 'Inicio', eyebrow: 'Resumen del espacio', subtitle: 'Una vista rápida de tu base de conocimiento local.' },
      bookmarks: { title: 'Marcadores', eyebrow: 'Biblioteca web', subtitle: 'Enlaces útiles, contexto y conexiones con tus notas.' },
      notes: { title: 'Notas', eyebrow: 'Conocimiento escrito', subtitle: 'Apuntes en Markdown, ordenados y conectados.' },
      search: { title: 'Resultados', eyebrow: 'Búsqueda global', subtitle: 'Coincidencias en notas, marcadores, taxonomías, descripciones y URLs.' },
      settings: { title: 'Backups y ajustes', eyebrow: 'Datos y preferencias', subtitle: 'Protege, importa y administra tu espacio local.' }
    };

    const iconPaths = {
      atlas: '<path d="M12 3 4.8 7v8L12 19l7.2-4V7L12 3Z"/><path d="m4.8 7 7.2 4 7.2-4M12 11v8"/>',
      home: '<path d="m3 10 9-7 9 7"/><path d="M5 9v11h14V9M9 20v-6h6v6"/>',
      bookmark: '<path d="M5 4.5A2.5 2.5 0 0 1 7.5 2h9A2.5 2.5 0 0 1 19 4.5V22l-7-4-7 4V4.5Z"/>',
      note: '<path d="M6 2h9l4 4v16H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z"/><path d="M14 2v5h5M8 12h8M8 16h6"/>',
      settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21h-4v-.08A1.7 1.7 0 0 0 8.94 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.57 15 1.7 1.7 0 0 0 3 14H3v-4h.08A1.7 1.7 0 0 0 4.6 8.94a1.7 1.7 0 0 0-.34-1.88L4.2 7l2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.57 1.7 1.7 0 0 0 10 3V3h4v.08A1.7 1.7 0 0 0 15.06 4.6a1.7 1.7 0 0 0 1.88-.34L17 4.2 19.83 7l-.06.06A1.7 1.7 0 0 0 19.43 9 1.7 1.7 0 0 0 21 10h.08v4H21a1.7 1.7 0 0 0-1.6 1Z"/>',
      search: '<circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/>',
      plus: '<path d="M12 5v14M5 12h14"/>',
      chevron: '<path d="m15 18-6-6 6-6"/>',
      grid: '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
      list: '<path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/>',
      star: '<path d="m12 3 2.8 5.67 6.2.9-4.5 4.38 1.06 6.18L12 17.2l-5.56 2.93 1.06-6.18L3 9.57l6.2-.9L12 3Z"/>',
      edit: '<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L8 18l-4 1 1-4Z"/>',
      clone: '<rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V5a1 1 0 0 0-1-1H5a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3"/>',
      trash: '<path d="M3 6h18M8 6V4h8v2M19 6l-1 15H6L5 6M10 11v5M14 11v5"/>',
      open: '<path d="M14 3h7v7M10 14 21 3"/><path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/>',
      tag: '<path d="M20.6 13.6 13.7 20.5a2 2 0 0 1-2.8 0L3.5 13.1A2 2 0 0 1 3 11.7V4a1 1 0 0 1 1-1h7.7a2 2 0 0 1 1.4.6l7.5 7.2a2 2 0 0 1 0 2.8Z"/><circle cx="7.5" cy="7.5" r="1.2"/>',
      folder: '<path d="M3 5h7l2 2h9v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5Z"/>',
      link: '<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.7-1.7"/>',
      document: '<path d="M6 2h9l4 4v16H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Z"/><path d="M14 2v5h5"/>',
      code: '<path d="m8 9-4 3 4 3M16 9l4 3-4 3M14 5l-4 14"/>',
      cloud: '<path d="M17.5 19H6a4 4 0 0 1-.6-7.95A7 7 0 0 1 19 9.5a4.8 4.8 0 0 1-1.5 9.5Z"/>',
      lock: '<rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>',
      terminal: '<path d="m4 6 5 5-5 5M11 18h9"/>',
      help: '<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/>',
      database: '<ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.66 3.58 3 8 3s8-1.34 8-3V5M4 11v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/>',
      backup: '<path d="M20 15a5 5 0 0 1-5 5H7a4 4 0 0 1-.8-7.92A6 6 0 0 1 17.7 9.5 5 5 0 0 1 20 15Z"/><path d="m9 14 3-3 3 3M12 11v6"/>',
      download: '<path d="M12 3v12M7 10l5 5 5-5M5 21h14"/>',
      upload: '<path d="M12 16V4M7 9l5-5 5 5M5 21h14"/>',
      restore: '<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>',
      close: '<path d="m6 6 12 12M18 6 6 18"/>',
      check: '<path d="m5 12 4 4L19 6"/>',
      alert: '<path d="M12 3 2.5 20h19L12 3Z"/><path d="M12 9v4M12 17h.01"/>',
      calendar: '<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/>',
      bold: '<path d="M7 4h7a4 4 0 0 1 0 8H7V4ZM7 12h8a4 4 0 0 1 0 8H7v-8Z"/>',
      italic: '<path d="M10 4h8M6 20h8M14 4 10 20"/>',
      quote: '<path d="M9 11H4a5 5 0 0 1 5-5v11a3 3 0 0 1-3 3M20 11h-5a5 5 0 0 1 5-5v11a3 3 0 0 1-3 3"/>',
      heading: '<path d="M5 4v16M19 4v16M5 12h14"/>',
      more: '<circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/>'
    };

    function icon(name, size = 18, filled = false) {
      const path = iconPaths[name] || iconPaths.link;
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 24 24" fill="' + (filled ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + path + '</svg>';
    }

    const el = id => document.getElementById(id);
    const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));
    const uid = prefix => prefix + '-' + crypto.randomUUID();
    const nowIso = () => new Date().toISOString();
    const normalizeText = value => String(value || '').trim().replace(/\s+/g, ' ');
    const normalizeKey = value => normalizeText(value).toLocaleLowerCase('es');
    const formatDate = value => value ? new Intl.DateTimeFormat('es-ES', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(value)) : 'Sin registro';
    const formatShortDate = value => value ? new Intl.DateTimeFormat('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }).format(new Date(value)) : '—';
    const truncate = (value, length = 140) => String(value || '').length > length ? String(value).slice(0, length).trim() + '…' : String(value || '');
    const unique = values => [...new Map(values.filter(Boolean).map(v => [normalizeKey(v), normalizeText(v)])).values()];
    const parseTags = value => unique(Array.isArray(value) ? value : String(value || '').split(',')).slice(0, 30);
    const taxonomyLabel = item => [item.category, item.subcategory].filter(Boolean).join(' / ') || 'Sin clasificar';

    function normalizeUrl(value) {
      let url = normalizeText(value);
      if (url && !/^[a-z][a-z\d+.-]*:\/\//i.test(url)) url = 'https://' + url;
      try {
        const parsed = new URL(url);
        if (!['http:', 'https:'].includes(parsed.protocol)) throw new Error('protocol');
        return parsed.href;
      } catch { return null; }
    }

    function domainOf(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
    }

    const storageService = {
      db: null,
      async init() {
        this.db = await new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = event => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains('notes')) db.createObjectStore('notes', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('bookmarks')) db.createObjectStore('bookmarks', { keyPath: 'id' });
            if (!db.objectStoreNames.contains('categories')) db.createObjectStore('categories', { keyPath: 'key' });
            if (!db.objectStoreNames.contains('tags')) db.createObjectStore('tags', { keyPath: 'key' });
            if (!db.objectStoreNames.contains('metadata')) db.createObjectStore('metadata', { keyPath: 'key' });
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      },
      request(store, mode, operation) {
        return new Promise((resolve, reject) => {
          const tx = this.db.transaction(store, mode);
          const result = operation(tx.objectStore(store));
          tx.oncomplete = () => resolve(result && result.result);
          tx.onerror = () => reject(tx.error || (result && result.error));
        });
      },
      getAll(store) { return this.request(store, 'readonly', objectStore => objectStore.getAll()); },
      put(store, value) { return this.request(store, 'readwrite', objectStore => objectStore.put(value)); },
      remove(store, key) { return this.request(store, 'readwrite', objectStore => objectStore.delete(key)); },
      clear(store) { return this.request(store, 'readwrite', objectStore => objectStore.clear()); },
      async replaceAll(payload) {
        const stores = ['notes','bookmarks','categories','tags','metadata'];
        await new Promise((resolve,reject) => {
          const tx = this.db.transaction(stores,'readwrite');
          stores.forEach(store => tx.objectStore(store).clear());
          (payload.notes || []).forEach(item => tx.objectStore('notes').put(item));
          (payload.bookmarks || []).forEach(item => tx.objectStore('bookmarks').put(item));
          (payload.categories || []).forEach(item => tx.objectStore('categories').put(item));
          (payload.tags || []).forEach(item => tx.objectStore('tags').put(item));
          (payload.metadata || []).forEach(item => tx.objectStore('metadata').put(item));
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
          tx.onabort = () => reject(tx.error || new Error('La importación fue cancelada.'));
        });
      }
    };

    const defaultPreferences = {
      section: 'home', sidebarCollapsed: false, bookmarkView: 'grid', noteView: 'grid',
      query: '', typeFilter: 'all', category: '', subcategory: '', tag: '', favorites: false, lastBackup: null
    };

    const uiStateService = {
      key: 'atlas-preferences-v1',
      load() {
        try { return { ...defaultPreferences, ...JSON.parse(localStorage.getItem(this.key) || '{}') }; }
        catch { return { ...defaultPreferences }; }
      },
      save(prefs) { localStorage.setItem(this.key, JSON.stringify(prefs)); },
      reset() { localStorage.removeItem(this.key); }
    };

    const state = {
      prefs: uiStateService.load(), notes: [], bookmarks: [], categories: [], tags: [],
      expandedId: null, relationSource: null, storageEstimate: null, initialized: false,
      treeExpanded: { note: new Set(), bookmark: new Set() }
    };
    let searchRenderTimer = null;

    const markdownService = {
      inline(text, images = {}) {
        let safe = escapeHtml(text);
        safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
        safe = safe.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        safe = safe.replace(/__([^_]+)__/g, '<strong>$1</strong>');
        safe = safe.replace(/\*([^*]+)\*/g, '<em>$1</em>');
        safe = safe.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, (match, alt, url) => {
          if (url.startsWith('local:') && images[url.slice(6)]) url = images[url.slice(6)];
          return '<img src="' + url + '" alt="' + alt + '" style="max-width:100%; border-radius:8px; display:block; margin: 10px 0;">';
        });
        safe = safe.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
        return safe;
      },
      render(source, images = {}) {
        if (!normalizeText(source)) return '<p class="markdown-placeholder">La vista previa aparecerá aquí.</p>';
        const lines = String(source).replace(/\r/g, '').split('\n');
        const blocks = [];
        let inCode = false, code = [], listType = null, paragraph = [], codeLang = '';
        const flushParagraph = () => { if (paragraph.length) { blocks.push('<p>' + this.inline(paragraph.join(' '), images) + '</p>'); paragraph = []; } };
        const closeList = () => { if (listType) { blocks.push('</' + listType + '>'); listType = null; } };
        const renderCodeBlock = () => {
          let hCode = '', raw = code.join('\n');
          if (window.hljs) {
            try { hCode = codeLang && hljs.getLanguage(codeLang) ? hljs.highlight(raw, {language: codeLang, ignoreIllegals: true}).value : hljs.highlightAuto(raw).value; }
            catch(e) { hCode = escapeHtml(raw); }
          } else hCode = escapeHtml(raw);
          const langLabel = codeLang ? '<span class="code-lang">' + escapeHtml(codeLang) + '</span>' : '';
          const codeClass = codeLang ? ' class="hljs language-' + escapeHtml(codeLang.toLowerCase()) + '"' : ' class="hljs"';
          blocks.push('<div class="code-wrap">' + langLabel + '<button class="code-copy" title="Copiar código" onclick="navigator.clipboard.writeText(this.nextElementSibling.textContent); const b=this; b.classList.add(\'copied\'); const s=b.querySelector(\'.sr-only\'); s.textContent=\'Código copiado\'; setTimeout(()=>{b.classList.remove(\'copied\'); s.textContent=\'\'}, 2000)"><span class="sr-only" aria-live="polite"></span>Copiar</button><pre><code' + codeClass + '>' + hCode + '</code></pre></div>');
        };
        for (const line of lines) {
          if (line.trim().startsWith('```')) {
            flushParagraph(); closeList();
            if (inCode) { renderCodeBlock(); code = []; inCode = false; codeLang = ''; }
            else { inCode = true; codeLang = line.trim().slice(3).trim(); }
            continue;
          }
          if (inCode) { code.push(line); continue; }
          const heading = line.match(/^(#{1,3})\s+(.+)$/);
          const unordered = line.match(/^\s*[-*+]\s+(.+)$/);
          const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
          const quote = line.match(/^>\s?(.+)$/);
          if (heading) { flushParagraph(); closeList(); const level = heading[1].length; blocks.push('<h' + level + '>' + this.inline(heading[2], images) + '</h' + level + '>'); }
          else if (unordered || ordered) {
            flushParagraph(); const type = unordered ? 'ul' : 'ol';
            if (listType !== type) { closeList(); blocks.push('<' + type + '>'); listType = type; }
            blocks.push('<li>' + this.inline((unordered || ordered)[1], images) + '</li>');
          } else if (quote) { flushParagraph(); closeList(); blocks.push('<blockquote>' + this.inline(quote[1], images) + '</blockquote>'); }
          else if (!line.trim()) { flushParagraph(); closeList(); }
          else paragraph.push(line.trim());
        }
        if (inCode) renderCodeBlock();
        flushParagraph(); closeList();
        return blocks.join('');
      }
    };

    const taxonomyService = {
      async sync() {
        const items = [...state.notes, ...state.bookmarks];
        const categories = new Map();
        const tags = new Map();
        items.forEach(item => {
          if (item.category) {
            const key = normalizeKey(item.category);
            const existing = categories.get(key) || { key, name: normalizeText(item.category), subcategories: [] };
            if (item.subcategory) existing.subcategories = unique([...existing.subcategories, item.subcategory]);
            categories.set(key, existing);
          }
          (item.tags || []).forEach(tag => tags.set(normalizeKey(tag), { key: normalizeKey(tag), name: normalizeText(tag) }));
        });
        state.categories = [...categories.values()].sort((a,b) => a.name.localeCompare(b.name, 'es'));
        state.tags = [...tags.values()].sort((a,b) => a.name.localeCompare(b.name, 'es'));
        await Promise.all([storageService.clear('categories'), storageService.clear('tags')]);
        for (const category of state.categories) await storageService.put('categories', category);
        for (const tag of state.tags) await storageService.put('tags', tag);
        updateDatalists();
      }
    };

    const searchService = {
      haystack(item) {
        const shared = [item.title, item.category, item.subcategory, ...(item.tags || []), item.description];
        if (item.type === 'bookmark') shared.push(item.url, domainOf(item.url));
        return normalizeKey(shared.filter(Boolean).join(' '));
      },
      filter(items) {
        const prefs = state.prefs;
        let result = items.filter(item => !item.deletedAt);
        if (state.relationSource) {
          result = relationService.related(state.relationSource, result).map(entry => entry.item);
        }
        if (prefs.query) { const q = normalizeKey(prefs.query); result = result.filter(item => this.haystack(item).includes(q)); }
        if (prefs.category) result = result.filter(item => normalizeKey(item.category) === normalizeKey(prefs.category));
        if (prefs.subcategory) result = result.filter(item => normalizeKey(item.subcategory) === normalizeKey(prefs.subcategory));
        if (prefs.tag) result = result.filter(item => (item.tags || []).some(tag => normalizeKey(tag) === normalizeKey(prefs.tag)));
        if (prefs.favorites) result = result.filter(item => item.favorite);
        return result.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      }
    };

    const relationService = {
      score(source, candidate) {
        const category = source.category && normalizeKey(source.category) === normalizeKey(candidate.category);
        const subcategory = source.subcategory && normalizeKey(source.subcategory) === normalizeKey(candidate.subcategory);
        const sourceTags = new Set((source.tags || []).map(normalizeKey));
        const matches = (candidate.tags || []).filter(tag => sourceTags.has(normalizeKey(tag)));
        if (!category && !subcategory && !matches.length) return null;
        let score = category ? 30 : 0;
        score += subcategory ? 35 : 0;
        score += Math.min(matches.length, 5) * 12;
        return { score, matches };
      },
      related(source, candidates) {
        return candidates.filter(item => item.id !== source.id && !item.deletedAt).map(item => {
          const relation = this.score(source, item);
          return relation ? { item, ...relation } : null;
        }).filter(Boolean).sort((a,b) => b.score - a.score || new Date(b.item.updatedAt) - new Date(a.item.updatedAt));
      }
    };

    const entityService = {
      async save(type, data, existingId = null) {
        const store = type === 'note' ? 'notes' : 'bookmarks';
        const collection = type === 'note' ? state.notes : state.bookmarks;
        const previous = existingId ? collection.find(item => item.id === existingId) : null;
        const timestamp = nowIso();
        const item = {
          ...(previous || {}), ...data, id: previous?.id || uid(type), type,
          createdAt: previous?.createdAt || timestamp, updatedAt: timestamp,
          deletedAt: previous?.deletedAt || null
        };
        await storageService.put(store, item);
        const index = collection.findIndex(entry => entry.id === item.id);
        if (index >= 0) collection[index] = item; else collection.push(item);
        await taxonomyService.sync();
        return item;
      },
      async toggleFavorite(type, id) {
        const collection = type === 'note' ? state.notes : state.bookmarks;
        const item = collection.find(entry => entry.id === id);
        if (!item) return;
        item.favorite = !item.favorite; item.updatedAt = nowIso();
        await storageService.put(type === 'note' ? 'notes' : 'bookmarks', item);
      },
      async trash(type, id) {
        const collection = type === 'note' ? state.notes : state.bookmarks;
        const item = collection.find(entry => entry.id === id);
        if (!item) return;
        item.deletedAt = nowIso(); item.updatedAt = item.deletedAt;
        await storageService.put(type === 'note' ? 'notes' : 'bookmarks', item);
      },
      async restore(type, id) {
        const collection = type === 'note' ? state.notes : state.bookmarks;
        const item = collection.find(entry => entry.id === id);
        if (!item) return;
        item.deletedAt = null; item.updatedAt = nowIso();
        await storageService.put(type === 'note' ? 'notes' : 'bookmarks', item);
      },
      async destroy(type, id) {
        const key = type === 'note' ? 'notes' : 'bookmarks';
        await storageService.remove(key, id);
        state[key] = state[key].filter(item => item.id !== id);
        await taxonomyService.sync();
      },
      async clone(type, id) {
        const collection = type === 'note' ? state.notes : state.bookmarks;
        const original = collection.find(item => item.id === id);
        if (!original) return null;
        const existing = collection.filter(item => item.clonedFrom === original.id || item.id === original.id).length;
        const copy = { ...original };
        delete copy.id; delete copy.createdAt; delete copy.updatedAt; delete copy.deletedAt;
        copy.clonedFrom = original.id;
        copy.title = type === 'bookmark' ? 'CLONED' + existing + ' · ' + original.title : original.title + ' · copia ' + existing;
        return this.save(type, copy);
      }
    };

    const backupService = {
      async payload() {
        return {
          schemaVersion: SCHEMA_VERSION, exportedAt: nowIso(),
          notes: state.notes, bookmarks: state.bookmarks,
          categories: state.categories, tags: state.tags,
          metadata: [{ key: 'lastExport', value: nowIso() }, { key: 'app', value: 'Atlas' }]
        };
      },
      async export() {
        const payload = await this.payload();
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'knowledge-backup-' + new Date().toISOString().slice(0,10) + '.json';
        document.body.appendChild(link); link.click(); link.remove();
        setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        state.prefs.lastBackup = payload.exportedAt; savePrefs();
        await storageService.put('metadata', { key: 'lastExport', value: payload.exportedAt });
        toast('Backup exportado', 'El archivo JSON se ha generado correctamente.');
        render();
      },
      validate(payload) {
        if (!payload || typeof payload !== 'object') throw new Error('El archivo no contiene un objeto JSON válido.');
        if (payload.schemaVersion !== SCHEMA_VERSION) throw new Error('Versión de esquema no compatible: ' + String(payload.schemaVersion ?? 'ausente') + '.');
        if (!Array.isArray(payload.notes) || !Array.isArray(payload.bookmarks)) throw new Error('Faltan las colecciones notes o bookmarks.');
        const sanitize = (item, type) => {
          if (!item || typeof item !== 'object' || item.type !== type) throw new Error('Hay elementos con un tipo incorrecto.');
          const id = String(item.id || '');
          if (!/^(note|bookmark)-[a-zA-Z0-9-]{8,}$/.test(id)) throw new Error('Hay un identificador no válido en el backup.');
          const title = normalizeText(item.title);
          if (!title) throw new Error('Hay elementos sin título.');
          const createdAt = Number.isNaN(Date.parse(item.createdAt)) ? nowIso() : item.createdAt;
          const updatedAt = Number.isNaN(Date.parse(item.updatedAt)) ? createdAt : item.updatedAt;
          const deletedAt = item.deletedAt && !Number.isNaN(Date.parse(item.deletedAt)) ? item.deletedAt : null;
          const shared = { id, type, title, category:normalizeText(item.category), subcategory:normalizeText(item.subcategory), tags:parseTags(item.tags), description:normalizeText(item.description), favorite:Boolean(item.favorite), createdAt, updatedAt, deletedAt };
          if (item.clonedFrom && /^(note|bookmark)-[a-zA-Z0-9-]{8,}$/.test(String(item.clonedFrom))) shared.clonedFrom = String(item.clonedFrom);
          if (type === 'note') {
            const images = (item.images && typeof item.images === 'object') ? item.images : {};
            return { ...shared, content:String(item.content || ''), contentFormat:'markdown', images };
          }
          const url = normalizeUrl(item.url);
          if (!url) throw new Error('Hay un marcador con una URL no válida.');
          return { ...shared, url, color:resolvePaletteColor(item.color), icon:bookmarkIcons.includes(item.icon) ? item.icon : 'link' };
        };
        payload.notes = payload.notes.map(item => sanitize(item,'note'));
        payload.bookmarks = payload.bookmarks.map(item => sanitize(item,'bookmark'));
        return payload;
      },
      async replace(payload) {
        await storageService.replaceAll({ ...payload, categories: payload.categories || [], tags: payload.tags || [], metadata: payload.metadata || [] });
        await loadData();
        await taxonomyService.sync();
        state.prefs.lastBackup = payload.exportedAt || null; savePrefs();
      },
      async merge(payload) {
        let added = 0, conflicts = 0;
        for (const [type, incoming] of [['note', payload.notes], ['bookmark', payload.bookmarks]]) {
          const collection = type === 'note' ? state.notes : state.bookmarks;
          for (const source of incoming) {
            const existing = collection.find(item => item.id === source.id);
            let item = { ...source };
            if (existing) {
              if (JSON.stringify(existing) === JSON.stringify(item)) continue;
              item.id = uid(type); item.title = item.title + ' · importado'; item.clonedFrom = source.id; conflicts++;
            }
            await storageService.put(type === 'note' ? 'notes' : 'bookmarks', item);
            collection.push(item); added++;
          }
        }
        await taxonomyService.sync();
        return { added, conflicts };
      }
    };

    function savePrefs() { uiStateService.save(state.prefs); }

    async function loadData() {
      [state.notes, state.bookmarks, state.categories, state.tags] = await Promise.all([
        storageService.getAll('notes'), storageService.getAll('bookmarks'), storageService.getAll('categories'), storageService.getAll('tags')
      ]);
      updateDatalists();
      if (navigator.storage?.estimate) state.storageEstimate = await navigator.storage.estimate();
    }

    function applyAccessibleButtonLabels(root = document) {
      root.querySelectorAll('button[title]:not([aria-label])').forEach(button => {
        if (!button.textContent.trim()) button.setAttribute('aria-label',button.title);
      });
    }

    function updateDatalists() {
      el('categoryOptions').innerHTML = state.categories.map(item => '<option value="' + escapeHtml(item.name) + '"></option>').join('');
      el('subcategoryOptions').innerHTML = unique(state.categories.flatMap(item => item.subcategories || [])).map(name => '<option value="' + escapeHtml(name) + '"></option>').join('');
      el('tagOptions').innerHTML = state.tags.map(item => '<option value="' + escapeHtml(item.name) + '"></option>').join('');
    }

    function setupStaticUI() {
      el('brandMark').innerHTML = icon('atlas', 20);
      el('searchIcon').innerHTML = icon('search', 18);
      document.querySelectorAll('[data-icon]').forEach(node => node.innerHTML = icon(node.dataset.icon, 17));
      el('globalSearch').value = state.prefs.query;
      el('appShell').classList.toggle('sidebar-collapsed', state.prefs.sidebarCollapsed);
      el('brandMark').setAttribute('aria-expanded',String(!state.prefs.sidebarCollapsed));
      el('brandMark').setAttribute('aria-label',state.prefs.sidebarCollapsed ? 'Expandir menú' : 'Contraer menú');
      el('brandMark').title = state.prefs.sidebarCollapsed ? 'Expandir menú' : 'Contraer menú';
    }

    function renderSidebar() {
      const activeNotes = state.notes.filter(item => !item.deletedAt).length;
      const activeBookmarks = state.bookmarks.filter(item => !item.deletedAt).length;
      const trash = [...state.notes, ...state.bookmarks].filter(item => item.deletedAt).length;
      const nav = [
        ['home','home','Inicio',''], ['bookmarks','bookmark','Marcadores',activeBookmarks],
        ['notes','note','Notas',activeNotes], ['settings','settings','Backups / ajustes',trash || '']
      ];
      el('sidebarNav').innerHTML = nav.map(([key, glyph, label, count]) =>
        '<button class="nav-button ' + (state.prefs.section === key ? 'active' : '') + '" type="button" data-section="' + key + '" title="' + label + '">' + icon(glyph, 19) + '<span class="nav-copy">' + label + '</span>' + (count !== '' ? '<span class="nav-count">' + count + '</span>' : '') + '</button>'
      ).join('');
      renderSidebarTree();
      applyAccessibleButtonLabels(document.querySelector('.sidebar'));
    }

    function renderSidebarTree() {
      const section = state.prefs.section;
      const tree = el('sidebarTree');
      if (!['bookmarks','notes'].includes(section)) { tree.innerHTML = ''; return; }
      const type = section === 'bookmarks' ? 'bookmark' : 'note';
      const label = type === 'bookmark' ? 'Marcadores' : 'Notas';
      const items = (type === 'bookmark' ? state.bookmarks : state.notes).filter(item => !item.deletedAt);
      const favorites = items.filter(item => item.favorite).length;
      const groups = new Map();
      let unclassified = 0;
      items.forEach(item => {
        if (!normalizeText(item.category)) { unclassified++; return; }
        const key = normalizeKey(item.category);
        if (!groups.has(key)) groups.set(key,{ key, name:normalizeText(item.category), count:0, subcategories:new Map() });
        const group = groups.get(key); group.count++;
        if (normalizeText(item.subcategory)) {
          const subKey = normalizeKey(item.subcategory);
          if (!group.subcategories.has(subKey)) group.subcategories.set(subKey,{ name:normalizeText(item.subcategory), count:0 });
          group.subcategories.get(subKey).count++;
        }
      });
      const expanded = state.treeExpanded[type];
      if (state.prefs.category && state.prefs.subcategory) expanded.add(normalizeKey(state.prefs.category));
      const allActive = !state.prefs.category && !state.prefs.subcategory && !state.prefs.favorites && !state.relationSource;
      const rootRows = '<div class="tree-row no-toggle"><button class="tree-link ' + (allActive ? 'active' : '') + '" type="button" data-tree-filter="all">' + icon('grid',15) + '<span class="tree-name">Todos</span><span class="tree-count">' + items.length + '</span></button></div>' +
        '<div class="tree-row no-toggle"><button class="tree-link ' + (state.prefs.favorites ? 'active' : '') + '" type="button" data-tree-filter="favorites">' + icon('star',15) + '<span class="tree-name">Favoritos</span><span class="tree-count">' + favorites + '</span></button></div>';
      const categoryRows = [...groups.values()].sort((a,b) => a.name.localeCompare(b.name,'es')).map(group => {
        const subcategories = [...group.subcategories.values()].sort((a,b) => a.name.localeCompare(b.name,'es'));
        const isExpanded = expanded.has(group.key);
        const categoryActive = normalizeKey(state.prefs.category) === group.key && !state.prefs.subcategory && !state.prefs.favorites;
        const children = isExpanded && subcategories.length ? '<div class="tree-children">' + subcategories.map(sub => {
          const childActive = normalizeKey(state.prefs.category) === group.key && normalizeKey(state.prefs.subcategory) === normalizeKey(sub.name) && !state.prefs.favorites;
          return '<button class="tree-link tree-child ' + (childActive ? 'active' : '') + '" type="button" data-tree-filter="subcategory" data-category="' + escapeHtml(group.name) + '" data-subcategory="' + escapeHtml(sub.name) + '">' + icon('tag',13) + '<span class="tree-name">' + escapeHtml(sub.name) + '</span><span class="tree-count">' + sub.count + '</span></button>';
        }).join('') + '</div>' : '';
        return '<div class="tree-row">' + (subcategories.length ? '<button class="tree-toggle ' + (isExpanded ? 'expanded' : '') + '" type="button" data-tree-toggle="' + escapeHtml(group.name) + '" title="' + (isExpanded ? 'Contraer' : 'Mostrar subcategorías') + '">' + icon('chevron',13) + '</button>' : '<span></span>') + '<button class="tree-link ' + (categoryActive ? 'active' : '') + '" type="button" data-tree-filter="category" data-category="' + escapeHtml(group.name) + '">' + icon('folder',15) + '<span class="tree-name">' + escapeHtml(group.name) + '</span><span class="tree-count">' + group.count + '</span></button>' + children + '</div>';
      }).join('');
      tree.innerHTML = '<div class="tree-head"><span>Explorar ' + label.toLocaleLowerCase('es') + '</span><span>' + groups.size + ' categorías</span></div><div class="tree-list">' + rootRows + categoryRows + '</div>' + (unclassified ? '<div class="tree-unclassified">' + icon('more',13) + '<span>Sin clasificar</span><span>' + unclassified + '</span></div>' : '');
    }

    function pageHead(section, actions = '') {
      const info = sectionInfo[section];
      return '<div class="page-head"><div><div class="eyebrow">' + info.eyebrow + '</div><h1 class="page-title">' + info.title + '</h1><p class="page-subtitle">' + info.subtitle + '</p></div>' + (actions ? '<div class="page-head-actions">' + actions + '</div>' : '') + '</div>';
    }

    function emptyState(kind, filtered = false) {
      const configs = {
        bookmarks: filtered ? ['search','No hay marcadores que encajen','Prueba a quitar algún filtro o usa otros términos.','Limpiar filtros','clear-filters'] : ['bookmark','Tu biblioteca web está vacía','Guarda el primer enlace con contexto, tags y categoría.','Crear marcador','quick-bookmark'],
        notes: filtered ? ['search','No hay notas que encajen','La búsqueda no revisa el contenido largo de las notas.','Limpiar filtros','clear-filters'] : ['note','Todavía no hay notas','Crea un apunte en Markdown y empieza a conectar ideas.','Crear nota','quick-note'],
        trash: ['trash','La papelera está vacía','Los elementos eliminados aparecerán aquí antes de borrarse definitivamente.','','']
      };
      const c = configs[kind];
      return '<div class="empty-state"><div class="empty-inner"><div class="empty-icon">' + icon(c[0], 23) + '</div><h3>' + c[1] + '</h3><p>' + c[2] + '</p>' + (c[3] ? '<button class="button primary" type="button" data-action="' + c[4] + '">' + icon(c[4] === 'clear-filters' ? 'close' : 'plus', 16) + c[3] + '</button>' : '') + '</div></div>';
    }

    function filterControls(type, items) {
      const categories = unique(items.filter(i => !i.deletedAt).map(i => i.category)).sort((a,b) => a.localeCompare(b,'es'));
      const subcategories = unique(items.filter(i => !i.deletedAt).map(i => i.subcategory)).sort((a,b) => a.localeCompare(b,'es'));
      const tags = unique(items.filter(i => !i.deletedAt).flatMap(i => i.tags || [])).sort((a,b) => a.localeCompare(b,'es'));
      const filteredCount = searchService.filter(items).length;
      const view = type === 'bookmark' ? state.prefs.bookmarkView : state.prefs.noteView;
      const options = (values, selected, placeholder) => '<option value="">' + placeholder + '</option>' + values.map(value => '<option value="' + escapeHtml(value) + '" ' + (normalizeKey(selected) === normalizeKey(value) ? 'selected' : '') + '>' + escapeHtml(value) + '</option>').join('');
      return '<div class="filters">' +
        '<select class="filter-select" data-filter="category" aria-label="Filtrar por categoría">' + options(categories,state.prefs.category,'Todas las categorías') + '</select>' +
        '<select class="filter-select" data-filter="subcategory" aria-label="Filtrar por subcategoría">' + options(subcategories,state.prefs.subcategory,'Subcategorías') + '</select>' +
        '<select class="filter-select" data-filter="tag" aria-label="Filtrar por tag">' + options(tags,state.prefs.tag,'Todos los tags') + '</select>' +
        '<label class="check-row"><input type="checkbox" data-filter="favorites" ' + (state.prefs.favorites ? 'checked' : '') + '> Sólo favoritos</label>' +
        (state.relationSource ? '<span class="relation-chip">Relacionados con “' + escapeHtml(truncate(state.relationSource.title,28)) + '”<button data-action="clear-relation" title="Quitar relación">' + icon('close',13) + '</button></span>' : '') +
        '<span class="filter-spacer"></span><span class="result-count">' + filteredCount + ' resultado' + (filteredCount === 1 ? '' : 's') + '</span>' +
        '<div class="view-switch" aria-label="Cambiar vista"><button class="' + (view === 'grid' ? 'active' : '') + '" data-action="set-view" data-view="grid" data-type="' + type + '" title="Vista tarjetas">' + icon('grid',14) + '</button><button class="' + (view === 'list' ? 'active' : '') + '" data-action="set-view" data-view="list" data-type="' + type + '" title="Vista lista">' + icon('list',15) + '</button></div>' +
      '</div>';
    }

    function renderTags(tags, matching = []) {
      if (!tags?.length) return '<span class="tag">sin tags</span>';
      const matchSet = new Set(matching.map(normalizeKey));
      return tags.slice(0,3).map(tag => '<span class="tag ' + (matchSet.has(normalizeKey(tag)) ? 'match' : '') + '">' + escapeHtml(tag) + '</span>').join('');
    }

    function cardActions(item) {
      return '<div class="card-actions">' +
        '<button class="icon-button ' + (item.favorite ? 'starred' : '') + '" data-action="favorite" data-type="' + item.type + '" data-id="' + item.id + '" title="' + (item.favorite ? 'Quitar favorito' : 'Marcar favorito') + '">' + icon('star',15,item.favorite) + '</button>' +
        '<button class="icon-button" data-action="edit" data-type="' + item.type + '" data-id="' + item.id + '" title="Editar">' + icon('edit',15) + '</button>' +
        '<button class="icon-button" data-action="clone" data-type="' + item.type + '" data-id="' + item.id + '" title="Clonar">' + icon('clone',15) + '</button>' +
        '<button class="icon-button danger" data-action="trash" data-type="' + item.type + '" data-id="' + item.id + '" title="Mover a papelera">' + icon('trash',15) + '</button>' +
      '</div>';
    }

    function renderCards(items) {
      return '<div class="cards-grid">' + items.map((item,index) => {
        const accent = item.type === 'bookmark' ? resolvePaletteColor(item.color) : DEFAULT_COLOR;
        const symbol = item.type === 'bookmark' ? item.icon : 'note';

        const category = item.category || 'Sin categoría';
        const taxonomy = '<div class="card-taxonomy"><span>' + escapeHtml(category) + '</span>' + (item.subcategory ? '<span class="taxonomy-dot">·</span><span>' + escapeHtml(item.subcategory) + '</span>' : '') + '</div>';

          '<div class="card-top"><div class="item-symbol">' + icon(symbol,20) + '</div><div class="card-heading"><h2 class="card-title">' + escapeHtml(item.title) + '</h2>' + taxonomy + '</div></div>' +
          '<p class="card-description">' + escapeHtml(item.description || (item.type === 'bookmark' ? item.url : truncate(item.content,110)) || 'Sin descripción todavía.') + '</p>' +

    function relatedHtml(item) {
      const targets = item.type === 'bookmark' ? state.notes : state.bookmarks;
      const related = relationService.related(item, targets);
      const label = item.type === 'bookmark' ? 'Notas relacionadas' : 'Marcadores relacionados';
      if (!related.length) return '<div class="related-block"><div class="related-head"><strong>' + label + '</strong></div><div class="detail-copy">No hay coincidencias por categoría, subcategoría o tags.</div></div>';
      return '<div class="related-block"><div class="related-head"><strong>' + label + '</strong><button class="text-button" data-action="view-related" data-type="' + item.type + '" data-id="' + item.id + '">Ver todos (' + related.length + ')</button></div><div class="mini-list">' + related.slice(0,5).map(entry =>
        '<button class="mini-item" type="button" data-action="open-related" data-type="' + entry.item.type + '" data-id="' + entry.item.id + '"><div class="mini-icon">' + icon(entry.item.type === 'note' ? 'note' : entry.item.icon,14) + '</div><div class="mini-copy"><strong>' + escapeHtml(entry.item.title) + '</strong><span>' + escapeHtml(taxonomyLabel(entry.item)) + (entry.matches.length ? ' · ' + escapeHtml(entry.matches.join(', ')) : '') + '</span></div>' + icon('open',13) + '</button>'
      ).join('') + '</div></div>';
